              '</div>' +
              '<div id="cmd-panel" class="cmd-panel" data-project-id="' + escapeHtml(projectId) + '"></div>' +
              '<div class="chat-input-area">' +
                '<div class="chat-attachments" id="chat-attachments"></div>' +
                '<div class="chat-input-wrapper">' +
                  '<div class="chat-input-left">' +
                    '<textarea class="' + inputClass + '" id="chat-input" placeholder="' + inputPlaceholder + '" rows="3" onkeydown="handleChatKeydown(event, \'' + escapeHtml(projectId) + '\', ' + (awaitingResponse ? 'true' : 'false') + ')"></textarea>' +
                    '<div class="chat-input-hint">' +
                      (navigator.platform.indexOf("Mac") > -1 ? 'Cmd' : 'Ctrl') + '+Enter to send' +
                    '</div>' +
                  '</div>' +
                  '<div class="chat-input-actions">' +
                    '<button class="' + sendBtnClass + '" id="chat-send-btn" onclick="sendChatMessage(\'' + escapeHtml(projectId) + '\', ' + (awaitingResponse ? 'true' : 'false') + ')">' + sendBtnText + '</button>' +
                    '<button class="chat-attach-btn" id="chat-attach-btn" onclick="document.getElementById(\'chat-file-input\').click()" title="Attach files">&#128206;</button>' +
                    '<input type="file" id="chat-file-input" multiple accept="image/*" style="display:none" onchange="handleFileSelect(event)">' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>' +
          '</div>';

        // Scroll to bottom
        var chatMessages = document.getElementById('chat-messages');
        if (chatMessages) {
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Focus input, restore draft, and setup drag-drop
        var chatInput = document.getElementById('chat-input');
        if (chatInput) {
          // Restore saved draft for this project
          var draft = chatInputDrafts[projectId];
          if (draft) {
            chatInput.value = draft;
          }
          chatInput.focus();
          // Save draft on every input change and handle slash-command filtering
          chatInput.addEventListener('input', function() {
            chatInputDrafts[projectId] = chatInput.value;
            handleSlashCommandInput(chatInput.value);
          });
        }
        setupChatDragDrop();
        chatAttachments = []; // Reset on re-render

        // Load settings custom commands for the dropdown bar
        loadSettingsCommands(project.projectPath);

      } catch (error) {
        app.innerHTML = 
          '<div class="card">' +
            '<div class="error-message">Error: ' + escapeHtml(error.message) + '</div>' +
            '<a href="/dashboard" class="btn btn-secondary" onclick="event.preventDefault(); navigate(\'/dashboard\')">Back to Dashboard</a>' +
          '</div>';
      }
    }

    // Pending file attachments (base64 encoded)
    var chatAttachments = [];

    // Handle chat input keydown: Enter = newline, Ctrl/Cmd+Enter = send
    function handleChatKeydown(event, projectId, isRespond) {
      if (event.key === 'Enter' && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        sendChatMessage(projectId, isRespond);
      }
      // Plain Enter = newline (default textarea behavior, no preventDefault)
    }

    // ============================================
    // Settings Custom Command Dropdowns
    // ============================================

    // Track which dropdown is active (null, 'global', or 'project')
    var activeCommandDropdown = null;

    // Cached command data from settings
    var settingsCommandsCache = { global: [], project: [] };

    /**
     * Load custom commands from settings.json AND slash commands from .claude/commands/*.md
     * and populate the dropdown bar if commands exist.
     */
    async function loadSettingsCommands(projectPath) {
      try {
        var qp = projectPath ? '?projectPath=' + encodeURIComponent(projectPath) : '';

        // Fetch both settings commands and slash commands in parallel
        var [settingsRes, slashRes] = await Promise.all([
          fetch('/api/claude-settings/custom-commands' + qp),
          fetch('/api/claude-settings/slash-commands' + qp)
        ]);
        var settingsData = await settingsRes.json();
        var slashData = slashRes.ok ? await slashRes.json() : { global: [], project: [] };

        // Merge: settings commands + slash commands (slash commands use name as prompt prefix)
        var globalFromSettings = (settingsData.global || []);
        var projectFromSettings = (settingsData.project || []);
        var globalSlash = (slashData.global || []).map(function(cmd) {
          return { name: cmd.name.replace(/^\//, ''), description: cmd.description, prompt: cmd.name + ' ', isSlashCommand: true };
        });
        var projectSlash = (slashData.project || []).map(function(cmd) {
          return { name: cmd.name.replace(/^\//, ''), description: cmd.description, prompt: cmd.name + ' ', isSlashCommand: true };
        });

        settingsCommandsCache.global = globalFromSettings.concat(globalSlash);
        settingsCommandsCache.project = projectFromSettings.concat(projectSlash);

        var bar = document.getElementById('cmd-dropdown-bar');
        if (!bar) return;

        // Show the bar only if at least one scope has commands
        if (settingsCommandsCache.global.length > 0 || settingsCommandsCache.project.length > 0) {
          bar.style.display = 'flex';
        } else {
          bar.style.display = 'none';
          return;
        }

        // Populate global select
        populateCommandSelect('cmd-select-global', settingsCommandsCache.global);
        // Populate project select
        populateCommandSelect('cmd-select-project', settingsCommandsCache.project);

        // Disable toggle buttons when no commands for that scope
        var globalToggle = document.getElementById('cmd-toggle-global');
        var projectToggle = document.getElementById('cmd-toggle-project');
        if (globalToggle) {
          globalToggle.disabled = settingsCommandsCache.global.length === 0;
          if (settingsCommandsCache.global.length === 0) globalToggle.title = 'No global custom commands';
        }
        if (projectToggle) {
          projectToggle.disabled = settingsCommandsCache.project.length === 0;
          if (settingsCommandsCache.project.length === 0) projectToggle.title = 'No project custom commands';
        }

        // Reset dropdown state
        activeCommandDropdown = null;

        // Populate the clickable command panel
        populateCommandPanel();

      } catch (err) {
        // Silently fail - dropdowns are optional UI enhancement
        console.warn('[cmd-dropdown] Failed to load settings commands:', err);
      }
    }

    /**
     * Populate a <select> element with command options.
     */
    function populateCommandSelect(selectId, commands) {
      var select = document.getElementById(selectId);
      if (!select) return;
      // Keep the placeholder option, clear the rest
      select.innerHTML = '<option value="">-- select --</option>';
      for (var i = 0; i < commands.length; i++) {
        var cmd = commands[i];
        var opt = document.createElement('option');
        opt.value = cmd.name;
        opt.textContent = '/' + cmd.name + (cmd.description ? ' - ' + cmd.description : '');
        opt.setAttribute('data-prompt', cmd.prompt);
        select.appendChild(opt);
      }
    }

    /**
     * Toggle a command dropdown (global or project).
     * Enforces mutual exclusivity: only one dropdown can be active at a time.
     */
    function toggleCommandDropdown(scope) {
      var globalSelect = document.getElementById('cmd-select-global');
      var projectSelect = document.getElementById('cmd-select-project');
      var globalToggle = document.getElementById('cmd-toggle-global');
      var projectToggle = document.getElementById('cmd-toggle-project');

      if (activeCommandDropdown === scope) {
        // Deactivate current
        activeCommandDropdown = null;
        if (globalSelect) globalSelect.style.display = 'none';
        if (projectSelect) projectSelect.style.display = 'none';
        if (globalToggle) globalToggle.classList.remove('active');
        if (projectToggle) projectToggle.classList.remove('active');
      } else {
        // Activate the requested scope, deactivate the other
        activeCommandDropdown = scope;
        if (scope === 'global') {
          if (globalSelect) globalSelect.style.display = '';
          if (projectSelect) projectSelect.style.display = 'none';
          if (globalToggle) globalToggle.classList.add('active');
          if (projectToggle) projectToggle.classList.remove('active');
        } else {
          if (globalSelect) globalSelect.style.display = 'none';
          if (projectSelect) projectSelect.style.display = '';
          if (globalToggle) globalToggle.classList.remove('active');
          if (projectToggle) projectToggle.classList.add('active');
        }
      }
    }

    /**
     * Handle selecting a command from the dropdown.
     * Populates the chat input with the command's prompt.
     */
    function selectSettingsCommand(selectElement, projectId) {
      var selectedOption = selectElement.options[selectElement.selectedIndex];
      if (!selectedOption || !selectedOption.value) return;

      var prompt = selectedOption.getAttribute('data-prompt');
      if (!prompt) return;

      var chatInput = document.getElementById('chat-input');
      if (chatInput) {
        chatInput.value = prompt;
        chatInput.focus();
        // Save as draft
        if (projectId) {
          chatInputDrafts[projectId] = prompt;
        }
      }

      // Reset selection back to placeholder
      selectElement.selectedIndex = 0;
    }

    /**
     * Populate the clickable command panel with all available commands.
     * Commands are grouped by scope (global / project).
     */
    function populateCommandPanel() {
      var panel = document.getElementById('cmd-panel');
      if (!panel) return;

      var globalCmds = settingsCommandsCache.global || [];
      var projectCmds = settingsCommandsCache.project || [];

      if (globalCmds.length === 0 && projectCmds.length === 0) {
        panel.classList.remove('active');
        return;
      }

      var html = '';
      if (globalCmds.length > 0) {
        html += '<div class="cmd-panel-scope">Global Commands</div>';
        for (var i = 0; i < globalCmds.length; i++) {
          html += '<div class="cmd-panel-item" data-cmd-index="' + i + '" data-cmd-scope="global" onclick="selectCommandFromPanel(this)">' +
            '<span class="cmd-panel-item-name">/' + escapeHtml(globalCmds[i].name) + '</span>' +
            '<span class="cmd-panel-item-desc">' + escapeHtml(globalCmds[i].description || '') + '</span>' +
          '</div>';
        }
      }
      if (projectCmds.length > 0) {
        html += '<div class="cmd-panel-scope">Project Commands</div>';
        for (var j = 0; j < projectCmds.length; j++) {
          html += '<div class="cmd-panel-item" data-cmd-index="' + j + '" data-cmd-scope="project" onclick="selectCommandFromPanel(this)">' +
            '<span class="cmd-panel-item-name">/' + escapeHtml(projectCmds[j].name) + '</span>' +
            '<span class="cmd-panel-item-desc">' + escapeHtml(projectCmds[j].description || '') + '</span>' +
          '</div>';
        }
      }

      panel.innerHTML = html;
      // Panel is hidden by default; it appears when user types '/' in the chat input
      panel.classList.remove('active');
    }

    /**
     * Select a command from the clickable panel.
     * Populates the chat input with the command's prompt.
     */
    // Track which scope's command is currently selected (for mutual exclusion)
    var selectedCommandScope = null;

    function selectCommandFromPanel(element) {
      var scope = element.getAttribute('data-cmd-scope');
      var index = parseInt(element.getAttribute('data-cmd-index'), 10);
      var cmds = scope === 'global' ? settingsCommandsCache.global : settingsCommandsCache.project;

      if (!cmds || index < 0 || index >= cmds.length) return;

      var cmd = cmds[index];
      var chatInput = document.getElementById('chat-input');
      if (chatInput) {
        // For slash commands, prefix with the command name
        if (cmd.isSlashCommand) {
          chatInput.value = '/' + cmd.name + ' ';
        } else {
          chatInput.value = cmd.prompt;
        }
        chatInput.focus();
        var panel = document.getElementById('cmd-panel');
        var projectIdAttr = panel ? panel.getAttribute('data-project-id') : null;
        if (projectIdAttr) {
          chatInputDrafts[projectIdAttr] = chatInput.value;
        }
      }

      // Set mutual exclusion: selecting a command from one scope disables the other
      selectedCommandScope = scope;
      updateCommandScopeExclusion();

      // Collapse the panel after selection
      var panel = document.getElementById('cmd-panel');
      if (panel) panel.classList.remove('active');
    }

    /**
     * Update mutual exclusion: when one scope is selected, disable the other.
     * When input is cleared, re-enable both.
     */
    function updateCommandScopeExclusion() {
      var globalToggle = document.getElementById('cmd-toggle-global');
      var projectToggle = document.getElementById('cmd-toggle-project');
      if (!globalToggle || !projectToggle) return;

      if (selectedCommandScope === 'global') {
        projectToggle.disabled = true;
        projectToggle.title = 'Clear input to switch to project commands';
        globalToggle.disabled = settingsCommandsCache.global.length === 0;
      } else if (selectedCommandScope === 'project') {
        globalToggle.disabled = true;
        globalToggle.title = 'Clear input to switch to global commands';
        projectToggle.disabled = settingsCommandsCache.project.length === 0;
      } else {
        // No selection — restore based on command availability
        globalToggle.disabled = settingsCommandsCache.global.length === 0;
        globalToggle.title = settingsCommandsCache.global.length === 0 ? 'No global custom commands' : '';
        projectToggle.disabled = settingsCommandsCache.project.length === 0;
        projectToggle.title = settingsCommandsCache.project.length === 0 ? 'No project custom commands' : '';
      }
    }

    /**
     * Toggle the command panel visibility (used by the Commands bar button).
     */
    function toggleCommandPanel() {
      var panel = document.getElementById('cmd-panel');
      if (!panel) return;
      panel.classList.toggle('active');
    }

    /**
     * Handle slash-command input filtering.
     * When user types '/' at the start, show the command panel filtered by the typed prefix.
     * When input doesn't start with '/', hide the panel.
     */
    function handleSlashCommandInput(value) {
      var panel = document.getElementById('cmd-panel');
      if (!panel) return;

      // Reset mutual exclusion when input is cleared
      if (!value || value.trim() === '') {
        selectedCommandScope = null;
        updateCommandScopeExclusion();
      }

      var globalCmds = settingsCommandsCache.global || [];
      var projectCmds = settingsCommandsCache.project || [];
      if (globalCmds.length === 0 && projectCmds.length === 0) return;

      // Only trigger when input starts with '/'
      if (!value.startsWith('/')) {
        panel.classList.remove('active');
        return;
      }

      // Extract the filter text after '/'
      var filter = value.substring(1).toLowerCase().trim();

      // Filter commands by name prefix
      var filteredGlobal = globalCmds.filter(function(cmd) {
        return cmd.name.toLowerCase().startsWith(filter) || filter === '';
      });
      var filteredProject = projectCmds.filter(function(cmd) {
        return cmd.name.toLowerCase().startsWith(filter) || filter === '';
      });

      if (filteredGlobal.length === 0 && filteredProject.length === 0) {
        panel.classList.remove('active');
        return;
      }

      // Build filtered panel HTML
      var html = '';
      if (filteredGlobal.length > 0) {
        html += '<div class="cmd-panel-scope">Global Commands</div>';
        for (var i = 0; i < filteredGlobal.length; i++) {
          var gIdx = globalCmds.indexOf(filteredGlobal[i]);
          html += '<div class="cmd-panel-item" data-cmd-index="' + gIdx + '" data-cmd-scope="global" onclick="selectCommandFromPanel(this)">' +
            '<span class="cmd-panel-item-name">/' + escapeHtml(filteredGlobal[i].name) + '</span>' +
            '<span class="cmd-panel-item-desc">' + escapeHtml(filteredGlobal[i].description || '') + '</span>' +
          '</div>';
        }
      }
      if (filteredProject.length > 0) {
        html += '<div class="cmd-panel-scope">Project Commands</div>';
        for (var j = 0; j < filteredProject.length; j++) {
          var pIdx = projectCmds.indexOf(filteredProject[j]);
          html += '<div class="cmd-panel-item" data-cmd-index="' + pIdx + '" data-cmd-scope="project" onclick="selectCommandFromPanel(this)">' +
            '<span class="cmd-panel-item-name">/' + escapeHtml(filteredProject[j].name) + '</span>' +
            '<span class="cmd-panel-item-desc">' + escapeHtml(filteredProject[j].description || '') + '</span>' +
          '</div>';
        }
      }

      panel.innerHTML = html;
      panel.classList.add('active');
    }

    // Handle file selection from file input
    function handleFileSelect(event) {
      var files = event.target.files;
      if (!files || files.length === 0) return;
      for (var i = 0; i < files.length; i++) {
        addAttachment(files[i]);
      }
      // Reset the input so the same file can be re-selected
      event.target.value = '';
    }

    // Add a file as attachment (convert to base64)
    function addAttachment(file) {
      // Only accept image files
      if (!file.type.startsWith('image/')) {
        showToast('Only image files are supported. Got: ' + file.type, 'warning');
        return;
      }
      // Limit file size to 20MB
      if (file.size > 20 * 1024 * 1024) {
        showToast('File too large (max 20MB): ' + file.name, 'warning');
        return;
      }
      var reader = new FileReader();
      reader.onload = function(e) {
        var base64 = e.target.result; // data:image/png;base64,...
        var attachment = {
          id: 'att_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8),
          name: file.name,
          type: file.type,
          size: file.size,
          data: base64
        };
        chatAttachments.push(attachment);
        renderAttachments();
      };
      reader.readAsDataURL(file);
    }

    // Render attachment previews
    function renderAttachments() {
      var container = document.getElementById('chat-attachments');
      if (!container) return;
      if (chatAttachments.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = chatAttachments.map(function(att) {
        return '<div class="chat-attachment-item" data-att-id="' + att.id + '">' +
          '<img src="' + att.data + '" alt="' + escapeHtml(att.name) + '">' +
          '<span>' + escapeHtml(att.name) + ' (' + formatFileSize(att.size) + ')</span>' +
          '<button class="chat-attachment-remove" onclick="removeAttachment(\'' + att.id + '\')" title="Remove">&times;</button>' +
        '</div>';
      }).join('');
    }

    // Remove an attachment
    function removeAttachment(attId) {
      chatAttachments = chatAttachments.filter(function(a) { return a.id !== attId; });
      renderAttachments();
    }

    // Format file size
    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // Setup drag-and-drop for chat input container
    function setupChatDragDrop() {
      var container = document.getElementById('chat-input-container');
      var overlay = document.getElementById('chat-drop-overlay');
      if (!container || !overlay) return;

      var dragCounter = 0;

      container.addEventListener('dragenter', function(e) {
        e.preventDefault();
        e.stopPropagation();
        dragCounter++;
        overlay.classList.add('active');
      });

      container.addEventListener('dragleave', function(e) {
        e.preventDefault();
        e.stopPropagation();
        dragCounter--;
        if (dragCounter <= 0) {
          dragCounter = 0;
          overlay.classList.remove('active');
        }
      });

      container.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.stopPropagation();
      });

      container.addEventListener('drop', function(e) {
        e.preventDefault();
        e.stopPropagation();
        dragCounter = 0;
        overlay.classList.remove('active');
        var files = e.dataTransfer.files;
        if (files && files.length > 0) {
          for (var i = 0; i < files.length; i++) {
            addAttachment(files[i]);
          }
        }
      });
    }

    // Track current chat session's taskGroupId to reuse across messages
    // Reset when navigating to a new chat (see renderChat)
    var currentChatTaskGroupId = null;
    var currentChatProjectId = null;

    // Preserve chat input text across re-renders (keyed by projectId)
    var chatInputDrafts = {};

    // Send chat message (with optional attachments)
    async function sendChatMessage(projectId, isRespond) {
      var input = document.getElementById('chat-input');
      var sendBtn = document.getElementById('chat-send-btn');
      var content = input.value.trim();

      if (!content && chatAttachments.length === 0) return;

      // Disable input while sending
      input.disabled = true;
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';

      try {
        var endpoint = isRespond
          ? '/api/projects/' + encodeURIComponent(projectId) + '/respond'
          : '/api/projects/' + encodeURIComponent(projectId) + '/chat';

        // Build request body with optional images and taskGroupId for reuse
        var body = { content: content || '(image attached)' };
        if (!isRespond && currentChatTaskGroupId) {
          body.taskGroupId = currentChatTaskGroupId;
        }
        if (chatAttachments.length > 0) {
          body.images = chatAttachments.map(function(att) {
            return {
              name: att.name,
              type: att.type,
              data: att.data
            };
          });
        }

        var response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        var data = await response.json();
        if (data.error) throw new Error(data.message);

        // Store taskGroupId from response for reuse in subsequent messages
        if (data.taskGroupId) {
          currentChatTaskGroupId = data.taskGroupId;
        }

        // Show template injection indicators if applicable
        var injectionParts = [];
        if (data.inputTemplateInjected && data.inputTemplateName) injectionParts.push('Input: ' + data.inputTemplateName);
        if (data.outputTemplateInjected && data.outputTemplateName) injectionParts.push('Output: ' + data.outputTemplateName);
        if (data.bootstrapInjected) injectionParts.push('Bootstrap');
        if (injectionParts.length > 0) {
          showToast('Templates injected: ' + injectionParts.join(', '), 'info');
        }

        // Clear input, attachments, and draft on success
        input.value = '';
        chatAttachments = [];
        delete chatInputDrafts[projectId];

        // Re-enable input
        input.disabled = false;
        sendBtn.disabled = false;
        sendBtn.textContent = isRespond ? 'Respond' : 'Send';

        // Refresh chat
        renderChat(projectId);

      } catch (error) {
        showToast(error.message, 'error');
        input.disabled = false;
        sendBtn.disabled = false;
        sendBtn.textContent = isRespond ? 'Respond' : 'Send';
      }
    }

        // Load templates for dropdowns
        var templates = [];

          var tplRes = await fetch('/api/templates');
          if (tplRes.ok) {
            var tplData = await tplRes.json();
            templates = tplData.templates || [];
          }
        } catch(e) { /* proceed without templates */ }

        var project = res.project;
        var bootstrapPrompt = project.bootstrapPrompt || '';
        var projectType = project.projectType || 'normal';
        var currentProjectStatus = project.projectStatus || 'active';
        var inputTemplateId = project.inputTemplateId || '';
        var outputTemplateId = project.outputTemplateId || '';

        modal.innerHTML =
          '<div style="background: var(--bg-primary, #1a1a2e); color: var(--text-primary, #e0e0e0); padding: 24px; border-radius: 12px; max-width: 650px; width: 95%; max-height: 85vh; overflow-y: auto;">' +
            '<h3 style="margin-bottom: 16px;">Project Settings</h3>' +
            '<div class="form-group">' +

              '<select id="project-status-select">' +

                '<option value="completed"' + (currentProjectStatus === 'completed' ? ' selected' : '') + '>Completed</option>' +
              '</select>' +
            '</div>' +
            '<div class="form-group">' +
              '<label>Project Type</label>' +
              '<select id="project-type-select">' +
                '<option value="normal"' + (projectType === 'normal' ? ' selected' : '') + '>Normal</option>' +
                '<option value="runner-dev"' + (projectType === 'runner-dev' ? ' selected' : '') + '>Runner Dev (Self-modification)</option>' +
              '</select>' +
            '</div>' +

            '<hr style="border-color: var(--border-color, #2a2a4a); margin: 16px 0;" />' +
            '<h4 style="margin-bottom: 8px;">Prompt Templates</h4>' +
            '<p style="font-size: 0.8rem; color: #9ca3af; margin-bottom: 12px;">Select templates to automatically inject rules into every task for this project. Manage templates in Settings &gt; Templates.</p>' +

            '<div class="form-group">' +
              '<label>Input Template (rules injected before user prompt)</label>' +
              '<select id="input-template-select">' + inputOptions + '</select>' +
            '</div>' +
            '<div class="form-group">' +
              '<label>Output Template (format rules injected after user prompt)</label>' +
              '<select id="output-template-select">' + outputOptions + '</select>' +
            '</div>' +

            '<hr style="border-color: var(--border-color, #2a2a4a); margin: 16px 0;" />' +

              '<label>Bootstrap Prompt (raw text, injected in addition to templates)</label>' +
              '<textarea id="bootstrap-prompt-input" rows="4" style="font-family: monospace;">' + escapeHtml(bootstrapPrompt) + '</textarea>' +
              '<span style="font-size: 0.75rem; color: #9ca3af;">Legacy field. If templates are selected above, this is injected between input template and user prompt.</span>' +
            '</div>' +
            '<div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 16px;">' +
              '<button class="btn btn-secondary" onclick="closeSettingsModal()">Cancel</button>' +

        document.body.appendChild(modal);

      } catch (error) {

    // Close settings modal
    function closeSettingsModal() {
      var modal = document.getElementById('settings-modal');
      if (modal) modal.remove();
    }

    // Save project settings (Chat MVP settings modal)
    async function saveChatProjectSettings(projectId) {
      var projectType = document.getElementById('project-type-select').value;
      var projectStatus = document.getElementById('project-status-select').value;
      var bootstrapPrompt = document.getElementById('bootstrap-prompt-input').value;
      var inputTemplateEl = document.getElementById('input-template-select');
      var outputTemplateEl = document.getElementById('output-template-select');
      var inputTemplateId = inputTemplateEl ? (inputTemplateEl.value || null) : null;
      var outputTemplateId = outputTemplateEl ? (outputTemplateEl.value || null) : null;

      try {
        var response = await fetch('/api/projects/' + encodeURIComponent(projectId), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            projectType: projectType,
            projectStatus: projectStatus,
            bootstrapPrompt: bootstrapPrompt,
            inputTemplateId: inputTemplateId,
            outputTemplateId: outputTemplateId
          })
        });

        var data = await response.json();
        if (data.error) throw new Error(data.message);

        closeSettingsModal();
        
        // Refresh current page
        var path = window.location.pathname;
        if (path.startsWith('/chat/')) {
          renderChat(projectId);
        } else {
          renderProjectDetail(projectId);
        }

      } catch (error) {
        showToast('Error saving settings: ' + error.message, 'error');
      }
    }

            <h2>Run Detail</h2>
            <div class="action-bar">
              ${backBtn}
              <button class="refresh-btn" onclick="renderRunDetail('${escapeHtml(runId)}')">Refresh</button>
              <button class="btn btn-secondary" onclick="generateInspectionPacket('${escapeHtml(runId)}')">Generate Inspection Packet</button>
            </div>
          </div>

          <div class="card">
            <h3>Run Details</h3>
            <div class="detail-grid">
              <div class="detail-item">
                <label>Run ID</label>
                <value>${escapeHtml(run.runId)}</value>
              </div>
              <div class="detail-item">
                <label>Task Run ID</label>
                <value>${escapeHtml(run.taskRunId)}</value>
              </div>
              <div class="detail-item">
                <label>Status</label>
                <value><span class="badge badge-${run.status === 'COMPLETE' ? 'complete' : run.status === 'RUNNING' ? 'running' : run.status === 'ERROR' ? 'error' : 'queued'}">${run.status}</span></value>
              </div>
              <div class="detail-item">
                <label>Started</label>
                <value>${formatFullDate(run.startedAt)}</value>
              </div>
              ${run.endedAt ? '<div class="detail-item"><label>Ended</label><value>' + formatFullDate(run.endedAt) + '</value></div>' : ''}
              <div class="detail-item">
                <label>Event Count</label>
                <value>${run.eventCount}</value>
              </div>
            </div>
          </div>

          ${run.prompt ? '<div class="card"><h3>Prompt</h3><div class="prompt-box">' + escapeHtml(run.prompt) + '</div></div>' : ''}

          <div class="card">
            <h3>Events (${events.length})</h3>
            ${eventLog}
          </div>
        `;
      } catch (error) {
        app.innerHTML = `
          <div class="card">
            <div class="error-message">Error: ${escapeHtml(error.message)}</div>
            <a href="/dashboard" class="btn btn-secondary" onclick="event.preventDefault(); navigate('/dashboard')">Back to Dashboard</a>
          </div>
        `;
      }
    }

    // Generate Inspection Packet
    async function generateInspectionPacket(runId) {
      try {
        const response = await fetch('/api/inspection/run/' + encodeURIComponent(runId), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ generatedBy: 'user' }),
        });
        const packet = await response.json();
        if (packet.error) throw new Error(packet.message);

        // Open clipboard format in new window
        const clipboardUrl = '/api/inspection/' + encodeURIComponent(packet.packetId) + '/clipboard';
        showToast('Inspection packet generated: ' + packet.packetId, 'success', 6000);
      } catch (error) {
        showToast('Error generating packet: ' + error.message, 'error');
      }
    }

    // =========================================================================
    // Hooks Page - GUI Level Upgrade (3-tab: Events | Scripts | Health)
    // =========================================================================
    let hooksPageState = {
      scope: 'project',
      projectPath: '', // selected project path for project scope
      tab: 'events', // 'events' | 'scripts' | 'health'
      selectedEvent: null,
      selectedScript: null,
      events: [],
      scripts: [],
      inconsistencies: null,
      knownEvents: [],
      settingsPath: '',
      isDirty: false,
      isNewEvent: false,
      isNewScript: false,
      newScriptName: '',
    };

    /** Check if Hooks editor has unsaved changes; returns true if safe to proceed */
    function hooksGuardUnsaved(callback) {
      if (!hooksPageState.isDirty) { callback(); return; }
      showConfirmDialog('Unsaved Changes', 'You have unsaved changes. Discard them?', 'Discard', function() {
        hooksPageState.isDirty = false;
        callback();
      }, { danger: true });
    }

    async function renderHooksPage() {
      app.innerHTML = '<div class="loading">Loading Hooks...</div>';
      try {
        await loadProjectListCached();
        // Use unified sidebar context
        var scope = getContextScope();
        hooksPageState.scope = scope;
        hooksPageState.projectPath = claudeCodeContext.projectPath;
        var hPp = getContextProjectParam();
        var [hooksRes, scriptsRes, inconsRes] = await Promise.all([
          fetch('/api/claude-hooks/' + scope + hPp),
          fetch('/api/claude-hooks/' + scope + '/scripts' + hPp),
          fetch('/api/claude-hooks/' + scope + '/inconsistencies' + hPp),
        ]);
        var hooksData = hooksRes.ok ? await hooksRes.json() : { events: [], knownEvents: [], settingsPath: '' };
        var scriptsData = scriptsRes.ok ? await scriptsRes.json() : { scripts: [] };
        var inconsData = inconsRes.ok ? await inconsRes.json() : { issues: [], issueCount: 0 };
        hooksPageState.events = hooksData.events || [];
        hooksPageState.knownEvents = hooksData.knownEvents || [];
        hooksPageState.settingsPath = hooksData.settingsPath || '';
        hooksPageState.scripts = scriptsData.scripts || [];
        hooksPageState.inconsistencies = inconsData;
        // If selected item no longer exists, deselect
        if (hooksPageState.selectedEvent && !hooksPageState.events.find(function(e) { return e.event === hooksPageState.selectedEvent; })) {
          hooksPageState.selectedEvent = null;
        }
        if (hooksPageState.selectedScript && !hooksPageState.scripts.find(function(s) { return s.name === hooksPageState.selectedScript; })) {
          hooksPageState.selectedScript = null;
        }
        renderHooksContent();
      } catch (error) {
        app.innerHTML = '<div class="card"><h2>Error Loading Hooks</h2><p>' + escapeHtml(error.message) + '</p><button class="btn btn-primary" onclick="renderHooksPage()" style="margin-top:16px;">Retry</button></div>';
      }
    }

    function renderHooksContent() {
      var scope = hooksPageState.scope;
      var tab = hooksPageState.tab;
      var events = hooksPageState.events;
      var scripts = hooksPageState.scripts;
      var incons = hooksPageState.inconsistencies;
      var eventCount = events.length;
      var scriptCount = scripts.length;
      var issueCount = incons ? incons.issueCount : 0;

      // Build tab bar
      var tabBar = '<div class="hooks-tab-bar" data-testid="hooks-tabs">' +
        '<button class="hooks-tab' + (tab === 'events' ? ' active' : '') + '" data-testid="hooks-tab-events" onclick="switchHooksTab(\'events\')">Events<span class="tab-badge">' + eventCount + '</span></button>' +
        '<button class="hooks-tab' + (tab === 'scripts' ? ' active' : '') + '" data-testid="hooks-tab-scripts" onclick="switchHooksTab(\'scripts\')">Scripts<span class="tab-badge">' + scriptCount + '</span></button>' +
        '<button class="hooks-tab' + (tab === 'health' ? ' active' : '') + '" data-testid="hooks-tab-health" onclick="switchHooksTab(\'health\')">Health' +
        (issueCount > 0 ? '<span class="tab-badge" style="background:' + (incons.hasErrors ? '#fecaca;color:#991b1b' : '#fde68a;color:#92400e') + '">' + issueCount + '</span>' : '<span class="tab-badge" style="background:#d1fae5;color:#065f46">0</span>') +
        '</button></div>';

      // Build content based on tab
      var content = '';
      if (tab === 'events') {
        content = renderHooksEventsTab();
      } else if (tab === 'scripts') {
        content = renderHooksScriptsTab();
      } else if (tab === 'health') {
        content = renderHooksHealthTab();
      }

      app.innerHTML =
        '<div class="page-header"><h2>Hooks</h2>' +
        '<span class="scope-path" data-testid="hooks-path" style="font-size:0.78rem;color:#6b7280;margin-left:auto;">' + escapeHtml(hooksPageState.settingsPath) + '</span></div>' +
        tabBar + content;

      // Bind new event dropdown if present
      var sel = document.getElementById('hooks-new-event-select');
      if (sel) {
        sel.addEventListener('change', function() {
          if (this.value) { hooksCreateEvent(this.value); }
        });
      }
    }

    // --- Events Tab ---
    function renderHooksEventsTab() {
      var events = hooksPageState.events;
      var knownEvents = hooksPageState.knownEvents;
      var existingNames = events.map(function(e) { return e.event; });
      var unusedEvents = knownEvents.filter(function(e) { return existingNames.indexOf(e) === -1; });

      // List items
      var listItems = '';
      events.forEach(function(e) {
        var isActive = hooksPageState.selectedEvent === e.event;
        listItems += '<div class="pane-list-item' + (isActive ? ' active' : '') + '" data-testid="hooks-event-' + escapeHtml(e.event) + '" onclick="hooksSelectEvent(\'' + escapeHtml(e.event) + '\')">' +
          '<div><div class="item-name">' + escapeHtml(e.event) + '</div>' +
          '<div class="item-meta">' + e.commandCount + ' command(s)</div></div></div>';
      });
      if (events.length === 0 && !hooksPageState.isNewEvent) {
        listItems = '<div data-testid="hooks-empty-state" style="padding:32px 20px;text-align:center;color:#9ca3af;">' +
          '<div style="font-size:2rem;margin-bottom:8px;">&#9889;</div>' +
          '<div style="font-size:0.9rem;font-weight:600;margin-bottom:4px;">No hooks configured</div>' +
          '<div style="font-size:0.8rem;margin-bottom:12px;">Hooks let you run scripts at key Claude Code lifecycle events.</div></div>';
      }

      // Add new event dropdown
      var addEventDropdown = unusedEvents.length > 0
        ? '<select id="hooks-new-event-select" data-testid="hooks-new-event-select" style="font-size:0.8rem;padding:4px 6px;border:1px solid #d1d5db;border-radius:4px;">' +
          '<option value="">+ New hook...</option>' +
          unusedEvents.map(function(e) { return '<option value="' + e + '">' + e + '</option>'; }).join('') +
          '</select>'
        : '';

      // Editor content
      var editorContent = '';
      if (hooksPageState.selectedEvent) {
        var event = hooksPageState.selectedEvent;
        var eventData = events.find(function(e) { return e.event === event; });
        var cmds = eventData ? eventData.commands : [];

        editorContent = '<div class="pane-editor-header"><h3>' + escapeHtml(event) + '</h3>' +
          '<div style="display:flex;gap:6px;">' +
          '<button class="btn btn-sm" data-testid="hooks-add-cmd" onclick="hooksAddCommand(\'' + escapeHtml(event) + '\')">+ Add Command</button>' +
          '<button class="btn btn-sm btn-danger" data-testid="hooks-delete-event" onclick="hooksDeleteEvent(\'' + escapeHtml(event) + '\')">Delete Hook</button>' +
          '</div></div>' +
          '<div class="pane-editor-body"><div class="hook-commands-list" data-testid="hooks-commands-list">';

        cmds.forEach(function(cmd, i) {
          editorContent += '<div class="hook-command-entry" data-testid="hooks-cmd-' + i + '">' +
            '<div class="cmd-header"><span>Command #' + (i + 1) + '</span>' +
            '<button class="btn btn-sm btn-danger" onclick="hooksRemoveCommand(\'' + escapeHtml(event) + '\',' + i + ')" style="padding:2px 8px;font-size:0.75rem;">Remove</button></div>' +
            '<div class="hook-field"><label>Type</label>' +
            '<span class="hook-type-badge" data-testid="hooks-cmd-type-' + i + '">command</span></div>' +
            '<div class="hook-field"><label>Command</label>' +
            '<textarea data-testid="hooks-cmd-text-' + i + '" oninput="hooksPageState.isDirty=true;hooksUpdateCmd(\'' + escapeHtml(event) + '\',' + i + ',\'command\',this.value)">' + escapeHtml(cmd.command || '') + '</textarea></div>' +
            '<div class="hook-field"><label>Timeout (ms)</label>' +
            '<input type="number" value="' + (cmd.timeout || 60000) + '" data-testid="hooks-cmd-timeout-' + i + '" oninput="hooksPageState.isDirty=true;hooksUpdateCmd(\'' + escapeHtml(event) + '\',' + i + ',\'timeout\',parseInt(this.value))" /></div>' +
            '</div>';
        });

        editorContent += '</div>' +
          '<div style="margin-top:16px;display:flex;gap:8px;">' +
          '<button class="btn btn-primary" data-testid="hooks-save-event" onclick="hooksSaveEvent(\'' + escapeHtml(event) + '\')">Save</button></div></div>';
      } else {
        editorContent = '<div class="pane-editor-header"><h3>Hook Editor</h3></div>' +
          '<div class="pane-editor-body"><div class="pane-editor-empty" data-testid="hooks-editor-placeholder">Select a hook event from the list to edit, or create a new one.</div></div>';
      }

      return '<div class="two-pane" data-testid="hooks-two-pane"><div class="pane-list">' +
        '<div class="pane-list-header"><h3>Events (' + events.length + ')</h3>' + addEventDropdown + '</div>' +
        '<div class="pane-list-items" data-testid="hooks-event-list">' + listItems + '</div></div>' +
        '<div class="pane-editor" data-testid="hooks-editor-pane">' + editorContent + '</div></div>';
    }

    // --- Scripts Tab ---
    function renderHooksScriptsTab() {
      var scripts = hooksPageState.scripts;

      // List items
      var listItems = '';
      scripts.forEach(function(s) {
        var isActive = hooksPageState.selectedScript === s.name;
        listItems += '<div class="pane-list-item' + (isActive ? ' active' : '') + '" data-testid="hooks-script-' + escapeHtml(s.name) + '" onclick="hooksSelectScript(\'' + escapeHtml(s.name) + '\')">' +
          '<div><div class="item-name">' + escapeHtml(s.name) + '</div>' +
          '<div class="item-meta">' + (s.executable ? 'executable' : 'not executable') + ' &middot; ' + s.size + ' bytes</div></div></div>';
      });
      if (scripts.length === 0 && !hooksPageState.isNewScript) {
        listItems = '<div data-testid="hooks-scripts-empty" style="padding:32px 20px;text-align:center;color:#9ca3af;">' +
          '<div style="font-size:2rem;margin-bottom:8px;">&#128196;</div>' +
          '<div style="font-size:0.9rem;font-weight:600;margin-bottom:4px;">No scripts</div>' +
          '<div style="font-size:0.8rem;margin-bottom:12px;">Scripts are .sh files in .claude/hooks/ referenced by hook commands.</div>' +
          '<button class="btn btn-primary btn-sm" data-testid="hooks-new-script-btn" onclick="hooksStartNewScript()">+ Create Script</button></div>';
      }

      // Editor content
      var editorContent = '';
      if (hooksPageState.isNewScript) {
        editorContent = '<div class="pane-editor-header"><h3>New Script</h3></div>' +
          '<div class="pane-editor-body">' +
          '<div class="hook-field"><label>Script Name (must end with .sh)</label>' +
          '<input type="text" id="hooks-new-script-name" data-testid="hooks-new-script-name" placeholder="my-hook.sh" value="' + escapeHtml(hooksPageState.newScriptName) + '" /></div>' +
          '<div class="hook-field"><label>Content</label>' +
          '<textarea id="hooks-script-editor" data-testid="hooks-script-editor" class="script-editor-textarea" oninput="hooksPageState.isDirty=true">#!/bin/bash\n# Hook script\n\necho "Hello from hook"\n</textarea></div>' +
          '<div style="display:flex;gap:8px;margin-top:12px;">' +
          '<button class="btn btn-primary" data-testid="hooks-create-script-btn" onclick="hooksSaveNewScript()">Create Script</button>' +
          '<button class="btn btn-secondary" onclick="hooksCancelNewScript()">Cancel</button></div></div>';
      } else if (hooksPageState.selectedScript) {
        editorContent = '<div class="pane-editor-header"><h3>' + escapeHtml(hooksPageState.selectedScript) + '</h3>' +
          '<button class="btn btn-sm btn-danger" data-testid="hooks-delete-script" onclick="hooksDeleteScript(\'' + escapeHtml(hooksPageState.selectedScript) + '\')">Delete</button></div>' +
          '<div class="pane-editor-body">' +
          '<div id="hooks-script-meta" class="script-meta" data-testid="hooks-script-meta">Loading...</div>' +
          '<div class="hook-field"><label>Content</label>' +
          '<textarea id="hooks-script-editor" data-testid="hooks-script-editor" class="script-editor-textarea" oninput="hooksPageState.isDirty=true">Loading...</textarea></div>' +
          '<div style="display:flex;gap:8px;margin-top:12px;">' +
          '<button class="btn btn-primary" data-testid="hooks-save-script" onclick="hooksSaveScript(\'' + escapeHtml(hooksPageState.selectedScript) + '\')">Save</button></div></div>';
        // Load script content asynchronously
        setTimeout(function() { hooksLoadScriptContent(hooksPageState.selectedScript); }, 0);
      } else {
        editorContent = '<div class="pane-editor-header"><h3>Script Editor</h3></div>' +
          '<div class="pane-editor-body"><div class="pane-editor-empty" data-testid="hooks-script-placeholder">Select a script from the list to edit, or create a new one.</div></div>';
      }

      return '<div class="two-pane" data-testid="hooks-scripts-pane"><div class="pane-list">' +
        '<div class="pane-list-header"><h3>Scripts (' + scripts.length + ')</h3>' +
        '<button class="btn btn-sm" data-testid="hooks-new-script-btn" onclick="hooksStartNewScript()">+ New</button></div>' +
        '<div class="pane-list-items" data-testid="hooks-script-list">' + listItems + '</div></div>' +
        '<div class="pane-editor" data-testid="hooks-script-editor-pane">' + editorContent + '</div></div>';
    }

    // --- Health Tab ---
    function renderHooksHealthTab() {
      var incons = hooksPageState.inconsistencies;
      if (!incons) return '<div class="card"><p>Loading health check...</p></div>';

      var html = '';
      if (incons.issueCount === 0) {
        html += '<div class="hooks-alert success" data-testid="hooks-health-ok">All hooks and scripts are consistent. No issues detected.</div>';
      } else {
        if (incons.hasErrors) {
          html += '<div class="hooks-alert error" data-testid="hooks-health-error">' + incons.issues.filter(function(i) { return i.severity === 'error'; }).length + ' error(s) found. Some hooks reference missing scripts.</div>';
        }
        if (incons.hasWarnings) {
          html += '<div class="hooks-alert warning" data-testid="hooks-health-warning">' + incons.issues.filter(function(i) { return i.severity === 'warning'; }).length + ' warning(s) found.</div>';
        }
      }

      html += '<div class="card" data-testid="hooks-health-list"><h3>Issues (' + incons.issueCount + ')</h3>';
      if (incons.issueCount === 0) {
        html += '<p style="color:#6b7280;font-size:0.9rem;">No issues detected.</p>';
      } else {
        incons.issues.forEach(function(issue, idx) {
          var icon = issue.severity === 'error' ? '&#10060;' : '&#9888;&#65039;';
          var color = issue.severity === 'error' ? '#991b1b' : '#92400e';
          html += '<div style="padding:10px 0;border-bottom:1px solid #f3f4f6;" data-testid="hooks-issue-' + idx + '">' +
            '<div style="display:flex;align-items:center;gap:8px;">' +
            '<span style="color:' + color + ';">' + icon + '</span>' +
            '<span style="font-weight:500;font-size:0.88rem;">' + escapeHtml(issue.type.replace(/_/g, ' ')) + '</span>' +
            '<span class="scope-pill ' + issue.severity + '" style="background:' + (issue.severity === 'error' ? '#fecaca' : '#fde68a') + ';color:' + color + ';">' + issue.severity + '</span></div>' +
            '<div style="margin-top:4px;font-size:0.85rem;color:#4b5563;">' + escapeHtml(issue.message) + '</div></div>';
        });
      }
      html += '</div>';

      return html;
    }

    // --- Hooks Event Actions ---
    function switchHooksScope(scope) {
      hooksGuardUnsaved(function() {
        hooksPageState.scope = scope;
        hooksPageState.selectedEvent = null;
        hooksPageState.selectedScript = null;
        hooksPageState.isNewEvent = false;
        hooksPageState.isNewScript = false;
        hooksPageState.isDirty = false;
        renderHooksPage();
      });
    }

    function switchHooksProject(projectPath) {
      hooksGuardUnsaved(function() {
        hooksPageState.projectPath = projectPath;
        hooksPageState.selectedEvent = null;
        hooksPageState.selectedScript = null;
        hooksPageState.isNewEvent = false;
        hooksPageState.isNewScript = false;
        hooksPageState.isDirty = false;
        renderHooksPage();
      });
    }

    function switchHooksTab(tab) {
      hooksGuardUnsaved(function() {
        hooksPageState.tab = tab;
        hooksPageState.isDirty = false;
        renderHooksContent();
      });
    }

    function hooksSelectEvent(event) {
      hooksGuardUnsaved(function() {
        hooksPageState.selectedEvent = event;
        hooksPageState.isNewEvent = false;
        hooksPageState.isDirty = false;
        renderHooksContent();
      });
    }

    function hooksCreateEvent(event) {
      var scope = hooksPageState.scope;
      // Optimistically add to local state
      hooksPageState.events.push({ event: event, commands: [{ type: 'command', command: '', timeout: 60000 }], commandCount: 1 });
      hooksPageState.selectedEvent = event;
      hooksPageState.isDirty = true;
      renderHooksContent();
    }

    function hooksDeleteEvent(event) {
      showConfirmDialog(
        'Delete hook?',
        'Delete all commands for "' + event + '"? This will be saved immediately.',
        'Delete',
        async function() {
          try {
            var scope = hooksPageState.scope;
            var hPp = scope === 'project' ? projectPathParam(hooksPageState.projectPath) : '';
            var response = await fetch('/api/claude-hooks/' + scope + '/' + event + hPp, { method: 'DELETE' });
            var data = await response.json();
            if (response.ok && data.success) {
              showToast('Hook "' + event + '" deleted', 'success');
              hooksPageState.selectedEvent = null;
              hooksPageState.isDirty = false;
              renderHooksPage();
            } else {
              showToast(data.message || 'Failed to delete hook', 'error');
            }
          } catch (error) {
            showToast(error.message, 'error');
          }
        },
        { danger: true }
      );
    }

    function hooksAddCommand(event) {
      var eventData = hooksPageState.events.find(function(e) { return e.event === event; });
      if (eventData) {
        eventData.commands.push({ type: 'command', command: '', timeout: 60000 });
        eventData.commandCount = eventData.commands.length;
        hooksPageState.isDirty = true;
        renderHooksContent();
      }
    }

    function hooksRemoveCommand(event, index) {
      var eventData = hooksPageState.events.find(function(e) { return e.event === event; });
      if (eventData) {
        eventData.commands.splice(index, 1);
        eventData.commandCount = eventData.commands.length;
        hooksPageState.isDirty = true;
        renderHooksContent();
      }
    }

    function hooksUpdateCmd(event, index, field, value) {
      var eventData = hooksPageState.events.find(function(e) { return e.event === event; });
      if (eventData && eventData.commands[index]) {
        eventData.commands[index][field] = value;
      }
    }

    async function hooksSaveEvent(event) {
      var eventData = hooksPageState.events.find(function(e) { return e.event === event; });
      if (!eventData) return;

      // Read latest from textareas (DOM may have updated values)
      var cmdList = document.querySelectorAll('[data-testid^="hooks-cmd-text-"]');
      var timeoutList = document.querySelectorAll('[data-testid^="hooks-cmd-timeout-"]');
      cmdList.forEach(function(el, i) {
        if (eventData.commands[i]) {
          eventData.commands[i].command = el.value;
        }
      });
      timeoutList.forEach(function(el, i) {
        if (eventData.commands[i]) {
          eventData.commands[i].timeout = parseInt(el.value) || 60000;
        }
      });

      showConfirmDialog(
        'Save hook?',
        'Save "' + event + '" to ' + hooksPageState.settingsPath + '?',
        'Save',
        async function() {
          try {
            var scope = hooksPageState.scope;
            var hPp = scope === 'project' ? projectPathParam(hooksPageState.projectPath) : '';
            var response = await fetch('/api/claude-hooks/' + scope + '/' + event + hPp, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ commands: eventData.commands }),
            });
            var data = await response.json();
            if (response.ok && data.success) {
              showToast('Hook "' + event + '" saved', 'success');
              hooksPageState.isDirty = false;
              renderHooksPage();
            } else {
              showToast(data.message || 'Failed to save hook', 'error');
            }
          } catch (error) {
            showToast(error.message, 'error');
          }
        },
        { danger: false }
      );
    }

    // --- Hooks Script Actions ---
    function hooksSelectScript(name) {
      hooksGuardUnsaved(function() {
        hooksPageState.selectedScript = name;
        hooksPageState.isNewScript = false;
        hooksPageState.isDirty = false;
        renderHooksContent();
      });
    }

    function hooksStartNewScript() {
      hooksGuardUnsaved(function() {
        hooksPageState.selectedScript = null;

        hooksPageState.newScriptName = '';

    async function hooksSaveScript(filename) {
      var editor = document.getElementById('hooks-script-editor');
      var content = editor ? editor.value : '';
      showConfirmDialog('Save script?', 'Save "' + filename + '"?', 'Save', async function() {

    function hooksDeleteScript(filename) {
      showConfirmDialog('Delete script?', 'Delete "' + filename + '"? This cannot be undone.', 'Delete', async function() {
        try {
          var scope = hooksPageState.scope;
          var hPp = scope === 'project' ? projectPathParam(hooksPageState.projectPath) : '';

            showToast('Script "' + filename + '" deleted', 'success');

            hooksPageState.isDirty = false;

    // =========================================================================
    // Shared: Project list cache (for scope dropdowns)
    // =========================================================================
    var projectListCache = null;
    var projectListCacheTime = 0;

    async function loadProjectListCached() {
      var now = Date.now();
      if (projectListCache && (now - projectListCacheTime) < 30000) return projectListCache;
      try {
        var resp = await fetch('/api/projects');
        var data = await resp.json();
        projectListCache = (data.projects || []).map(function(p) {
          return { id: p.projectId, path: p.projectPath, alias: p.alias || p.projectPath, projectStatus: p.projectStatus || 'active' };
        });
        projectListCacheTime = now;
      } catch(e) {
        projectListCache = [];
      }
      return projectListCache;
    }

    /** Get the first project with an absolute path (usable with ?projectPath=) */
    function getFirstLocalProjectPath() {
      if (!projectListCache) return '';
      var p = projectListCache.find(function(x) { return x.path && x.path.charAt(0) === '/'; });
      return p ? p.path : '';
    }

    /**
     * Build a project <select> dropdown HTML.
     * @param {string} selectedPath - Currently selected project path
     * @param {string} onchangeHandler - JS expression for onchange (receives this.value)
     * @param {string} testId - data-testid for the select element
     */
    function buildProjectDropdownHtml(selectedPath, onchangeHandler, testId) {
      if (!projectListCache || projectListCache.length === 0) {
        return '<select class="project-select" data-testid="' + testId + '" disabled><option>No projects</option></select>';
      }
      // Only include projects with absolute paths (non-absolute paths can't be used with ?projectPath=)
      var validProjects = projectListCache.filter(function(p) { return p.path && p.path.charAt(0) === '/'; });
      if (validProjects.length === 0) {
        return '<select class="project-select" data-testid="' + testId + '" disabled><option>No local projects</option></select>';
      }
      var opts = validProjects.map(function(p) {
        var label = p.alias !== p.path ? p.alias + ' (' + shortenPath(p.path) + ')' : shortenPath(p.path);
        var sel = p.path === selectedPath ? ' selected' : '';
        return '<option value="' + escapeHtml(p.path) + '"' + sel + '>' + escapeHtml(label) + '</option>';
      }).join('');
      return '<select class="project-select" data-testid="' + testId + '" onchange="' + onchangeHandler + '">' + opts + '</select>';
    }

    function shortenPath(p) {
      if (!p) return '';
      var home = '';
      // Try to shorten home directory
      if (p.indexOf('/Users/') === 0) {
        var parts = p.split('/');
        home = '~';
        p = home + '/' + parts.slice(3).join('/');
      }
      // Truncate if still too long
      if (p.length > 50) p = '...' + p.slice(-47);
      return p;
    }

    /**
     * Build the projectPath query parameter string for API calls.
     * Returns empty string if no override needed.
     */
    function projectPathParam(projectPath) {
      if (!projectPath) return '';
      return '?projectPath=' + encodeURIComponent(projectPath);
    }

    // =========================================================================
    // Claude Code Context - unified scope/project for all CLAUDE CODE pages
    // =========================================================================
    var claudeCodeContext = {
      scope: 'project',   // 'global' or 'project'
      projectPath: '',     // absolute path when scope='project'
    };

    /** Render the sidebar context selector widget */
    async function renderSidebarContext() {
      var el = document.getElementById('claude-code-context');
      if (!el) return;
      await loadProjectListCached();
      if (claudeCodeContext.scope === 'project' && !claudeCodeContext.projectPath) {
        claudeCodeContext.projectPath = getFirstLocalProjectPath();
      }
      var html = '<div class="ctx-row">' +
        '<button class="ctx-btn' + (claudeCodeContext.scope === 'global' ? ' active' : '') + '" data-testid="context-scope-global" onclick="switchClaudeCodeScope(\'global\')">Global</button>' +
        '<button class="ctx-btn' + (claudeCodeContext.scope === 'project' ? ' active' : '') + '" data-testid="context-scope-project" onclick="switchClaudeCodeScope(\'project\')">Project</button>' +
        '</div>';
      if (claudeCodeContext.scope === 'project') {
        // Only show active projects (projectStatus === 'active' or undefined/missing defaults to 'active')
        var validProjects = (projectListCache || []).filter(function(p) {
          return p.path && p.path.charAt(0) === '/' && (p.projectStatus || 'active') === 'active';
        });
        if (validProjects.length > 0) {
          var opts = validProjects.map(function(p) {
            // Show alias only; fall back to shortened path only when no alias is set
            var label = (p.alias && p.alias !== p.path) ? p.alias : shortenPath(p.path);
            var sel = p.path === claudeCodeContext.projectPath ? ' selected' : '';
            return '<option value="' + escapeHtml(p.path) + '"' + sel + ' data-testid="context-project-option">' + escapeHtml(label) + '</option>';
          }).join('');
          html += '<select class="ctx-select" data-testid="context-project-select" onchange="switchClaudeCodeProject(this.value)">' + opts + '</select>';
        } else {
          html += '<div style="font-size:0.7rem;color:rgba(255,255,255,0.5);padding:2px 0;">No active projects</div>';
        }
      }
      el.innerHTML = html;
    }

    function switchClaudeCodeScope(scope) {
      var doSwitch = function() {
        claudeCodeContext.scope = scope;
        if (scope === 'project' && !claudeCodeContext.projectPath) {
          claudeCodeContext.projectPath = getFirstLocalProjectPath();
        }
        renderSidebarContext();
        reloadCurrentClaudeCodePage();
      };
      // Check for unsaved changes on the current page
      if (currentPath === '/hooks' && hooksPageState.isDirty) {
        hooksGuardUnsaved(doSwitch); return;
      }
      if (currentPath === '/commands' && cmdPageState.isDirty) {
        cmdGuardUnsaved(doSwitch); return;
      }
      if (currentPath === '/agents' && agentPageState.isDirty) {
        agentGuardUnsaved(doSwitch); return;
      }
      doSwitch();
    }

    function switchClaudeCodeProject(projectPath) {
      var doSwitch = function() {
        claudeCodeContext.projectPath = projectPath;
        renderSidebarContext();
        reloadCurrentClaudeCodePage();
      };
      if (currentPath === '/hooks' && hooksPageState.isDirty) {
        hooksGuardUnsaved(doSwitch); return;
      }
      if (currentPath === '/commands' && cmdPageState.isDirty) {
        cmdGuardUnsaved(doSwitch); return;
      }
      if (currentPath === '/agents' && agentPageState.isDirty) {
        agentGuardUnsaved(doSwitch); return;
      }
      doSwitch();
    }

    function reloadCurrentClaudeCodePage() {
      var claudeCodePages = ['/hooks', '/commands', '/agents', '/plugins', '/mcp-servers', '/ai-generate'];
      if (claudeCodePages.indexOf(currentPath) >= 0) {
        router();
      }
    }

    /** Get current scope for CLAUDE CODE API calls */
    function getContextScope() {
      return claudeCodeContext.scope;
    }

    /** Get current projectPath query param for CLAUDE CODE API calls */
    function getContextProjectParam() {
      if (claudeCodeContext.scope !== 'project') return '';
      return projectPathParam(claudeCodeContext.projectPath);
    }

    // =========================================================================
    // Commands Page - 2-pane CRUD
    // =========================================================================
    let cmdPageState = {
      scope: 'project',
      projectPath: '', // selected project path for project scope
      selected: null, // filename (without .md)
      files: [],
      dirPath: '',
      editorContent: '',
      isNew: false,
      newName: '',
      isDirty: false,
      savedContent: '', // track last saved/loaded content
    };

    /** Check if Commands editor has unsaved changes; returns true if safe to proceed */
    function cmdGuardUnsaved(callback) {
      if (!cmdPageState.isDirty) { callback(); return; }
      showConfirmDialog('Unsaved Changes', 'You have unsaved changes. Discard them?', 'Discard', function() {
        cmdPageState.isDirty = false;
        callback();
      }, { danger: true });
    }

    /** Validate command/agent filename on the client side */
    function isValidFilenameClient(name) {
      if (!name || name.length === 0 || name.length > 200) return false;
      return /^[a-zA-Z0-9][a-zA-Z0-9._-]*$/.test(name);
    }

    async function renderCommandsPage() {
      app.innerHTML = '<div class="loading">Loading Commands...</div>';
      try {
        await loadProjectListCached();
        // Use unified sidebar context
        var scope = getContextScope();
        cmdPageState.scope = scope;
        cmdPageState.projectPath = claudeCodeContext.projectPath;
        var pp = getContextProjectParam();
        const res = await fetch('/api/claude-files/commands/' + scope + pp);
        const data = await res.json();
        cmdPageState.files = data.files || [];
        cmdPageState.dirPath = data.dirPath || '';
        // If selected item no longer exists, deselect
        if (cmdPageState.selected && !cmdPageState.files.find(function(f) { return f.name === cmdPageState.selected; })) {
          cmdPageState.selected = null;
          cmdPageState.editorContent = '';
        }
        renderCommandsContent();
      } catch (error) {
        app.innerHTML = '<div class="card"><h2>Error Loading Commands</h2><p>' + escapeHtml(error.message) + '</p><button class="btn btn-primary" onclick="renderCommandsPage()" style="margin-top:16px;">Retry</button></div>';
      }
    }

    function renderCommandsContent() {
      var scope = cmdPageState.scope;
      var files = cmdPageState.files;

      // List items
      var listItems = '';
      files.forEach(function(f) {
        var isActive = cmdPageState.selected === f.name;
        listItems += '<div class="pane-list-item' + (isActive ? ' active' : '') + '" data-testid="cmd-item-' + escapeHtml(f.name) + '" onclick="selectCommand(\'' + escapeHtml(f.name) + '\')">' +
          '<div><div class="item-name">/' + escapeHtml(f.name) + '</div>' +
          '<div class="item-meta">.md</div></div></div>';
      });
      if (files.length === 0) {
        listItems = '<div data-testid="cmd-empty-state" style="padding:32px 20px;text-align:center;color:#9ca3af;">' +
          '<div style="font-size:2rem;margin-bottom:8px;">📝</div>' +
          '<div style="font-size:0.9rem;font-weight:600;margin-bottom:4px;">No commands yet</div>' +
          '<div style="font-size:0.8rem;margin-bottom:12px;">Commands are slash-command prompts stored as .md files.</div>' +
          '<button class="btn btn-primary btn-sm" onclick="startNewCommand()">+ Create First Command</button></div>';
      }

      // Editor
      var editorContent = '';
      if (cmdPageState.isNew) {
        editorContent = '<div class="pane-editor-header"><h3>New Command</h3></div>' +
          '<div class="pane-editor-body">' +
          '<div class="hook-field"><label>Command Name (filename without .md)</label>' +
          '<input type="text" id="cmd-new-name" data-testid="cmd-new-name" placeholder="my-command" value="' + escapeHtml(cmdPageState.newName) + '" /></div>' +
          '<div id="cmd-name-error" style="color:#ef4444;font-size:0.8rem;margin-top:-8px;display:none;" data-testid="cmd-name-error"></div>' +
          '<div class="hook-field"><label>Content (Markdown)</label>' +
          '<textarea id="cmd-editor" data-testid="cmd-editor" style="min-height:300px;" oninput="cmdPageState.isDirty=true"># New Command\n\nDescribe what this command does.\n\n$ARGUMENTS</textarea></div>' +
          '<div style="display:flex;gap:8px;margin-top:12px;">' +
          '<button class="btn btn-primary" data-testid="cmd-create-btn" onclick="saveNewCommand()">Create Command</button>' +
          '<button class="btn btn-secondary" onclick="cancelNewCommand()">Cancel</button></div></div>';
      } else if (cmdPageState.selected) {
        editorContent = '<div class="pane-editor-header"><h3>/' + escapeHtml(cmdPageState.selected) + '</h3>' +
          '<button class="btn btn-sm btn-danger" data-testid="cmd-delete-btn" onclick="deleteCommand(\'' + escapeHtml(cmdPageState.selected) + '\')">Delete</button></div>' +
          '<div class="pane-editor-body">' +
          '<div class="hook-field"><label>Content (Markdown)</label>' +
          '<textarea id="cmd-editor" data-testid="cmd-editor" style="min-height:300px;" oninput="cmdPageState.isDirty=true">' + escapeHtml(cmdPageState.editorContent) + '</textarea></div>' +
          '<div style="display:flex;gap:8px;margin-top:12px;">' +
          '<button class="btn btn-primary" data-testid="cmd-save-btn" onclick="saveCommand(\'' + escapeHtml(cmdPageState.selected) + '\')">Save</button></div></div>';
      } else {
        editorContent = '<div class="pane-editor-header"><h3>Editor</h3></div>' +
          '<div class="pane-editor-body"><div class="pane-editor-empty" data-testid="cmd-editor-placeholder">' +
          '<div style="font-size:2rem;margin-bottom:8px;">📝</div>' +
          'Select a command from the list or click <strong>+ New</strong> to create one.</div></div>';
      }

      app.innerHTML =
        '<div class="page-header"><h2>Commands</h2>' +
        '<span class="scope-path" data-testid="cmd-dir-path" style="font-size:0.78rem;color:#6b7280;margin-left:auto;">' + escapeHtml(cmdPageState.dirPath) + '</span></div>' +
        '<div class="two-pane" data-testid="cmd-two-pane"><div class="pane-list">' +
        '<div class="pane-list-header"><h3>Commands (' + files.length + ')</h3>' +
        '<button class="btn btn-sm" data-testid="cmd-new-btn" onclick="startNewCommand()">+ New</button></div>' +
        '<div class="pane-list-items" data-testid="cmd-list">' + listItems + '</div></div>' +
        '<div class="pane-editor" data-testid="cmd-editor-pane">' + editorContent + '</div></div>';
    }

    function switchCmdScope(scope) {
      cmdGuardUnsaved(function() {
        cmdPageState.scope = scope;
        cmdPageState.selected = null;
        cmdPageState.editorContent = '';
        cmdPageState.savedContent = '';
        cmdPageState.isNew = false;
        cmdPageState.isDirty = false;
        renderCommandsPage();
      });
    }

    function switchCmdProject(projectPath) {
      cmdGuardUnsaved(function() {
        cmdPageState.projectPath = projectPath;
        cmdPageState.selected = null;
        cmdPageState.editorContent = '';
        cmdPageState.savedContent = '';
        cmdPageState.isNew = false;
        cmdPageState.isDirty = false;
        renderCommandsPage();
      });
    }

    async function selectCommand(name) {
      if (name === cmdPageState.selected) return;
      cmdGuardUnsaved(async function() {
        cmdPageState.isNew = false;
        cmdPageState.selected = name;
        cmdPageState.isDirty = false;
        try {
          var cPp = cmdPageState.scope === 'project' ? projectPathParam(cmdPageState.projectPath) : '';
          var res = await fetch('/api/claude-files/commands/' + cmdPageState.scope + '/' + encodeURIComponent(name) + cPp);
          var data = await res.json();
          cmdPageState.editorContent = data.content || '';
          cmdPageState.savedContent = cmdPageState.editorContent;
        } catch (error) {
          showToast('Failed to load command: ' + error.message, 'error');
          cmdPageState.editorContent = '';
          cmdPageState.savedContent = '';
        }
        renderCommandsContent();
      });
    }

    function startNewCommand() {
      cmdGuardUnsaved(function() {
        cmdPageState.isNew = true;
        cmdPageState.selected = null;
        cmdPageState.newName = '';
        cmdPageState.isDirty = false;
        renderCommandsContent();
      });
    }

    function cancelNewCommand() {
      cmdPageState.isNew = false;
      cmdPageState.isDirty = false;
      renderCommandsContent();
    }

    function saveNewCommand() {
      var nameInput = document.getElementById('cmd-new-name');
      var editorEl = document.getElementById('cmd-editor');
      var errorEl = document.getElementById('cmd-name-error');
      var name = nameInput ? nameInput.value.trim() : '';
      var content = editorEl ? editorEl.value : '';
      // Client-side validation (AC-7)
      if (!name) {
        if (errorEl) { errorEl.textContent = 'Name is required.'; errorEl.style.display = 'block'; }
        showToast('Please enter a command name', 'warning'); return;
      }
      if (!isValidFilenameClient(name)) {
        if (errorEl) { errorEl.textContent = 'Invalid name. Must start with a letter or number. Only letters, numbers, dash, underscore, dot allowed.'; errorEl.style.display = 'block'; }
        showToast('Invalid filename: must start with letter/number, only [a-z0-9._-]', 'warning'); return;
      }
      if (errorEl) { errorEl.style.display = 'none'; }
      showConfirmDialog('Create command?', 'Create /' + name + ' in ' + cmdPageState.dirPath, 'Create', async function() {
        try {
          var cPp = cmdPageState.scope === 'project' ? projectPathParam(cmdPageState.projectPath) : '';
          var res = await fetch('/api/claude-files/commands/' + cmdPageState.scope + '/' + encodeURIComponent(name) + cPp, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: content }),
          });
          var data = await res.json();
          if (data.success) {
            showToast('Command created: /' + name, 'success');
            cmdPageState.isNew = false;
            cmdPageState.selected = name;
            cmdPageState.editorContent = content;
            cmdPageState.savedContent = content;
            cmdPageState.isDirty = false;
            renderCommandsPage();
          } else { showToast('Failed: ' + (data.error || '') + ' - ' + (data.message || 'Unknown error'), 'error'); }
        } catch (error) { showToast('API error: ' + error.message, 'error'); }
      }, { danger: false });
    }

    function saveCommand(name) {
      var editorEl = document.getElementById('cmd-editor');
      var content = editorEl ? editorEl.value : '';
      showConfirmDialog('Save command?', 'Save /' + name + ' to ' + cmdPageState.dirPath, 'Save', async function() {
        try {
          var cPp = cmdPageState.scope === 'project' ? projectPathParam(cmdPageState.projectPath) : '';
          var res = await fetch('/api/claude-files/commands/' + cmdPageState.scope + '/' + encodeURIComponent(name) + cPp, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: content }),
          });
          var data = await res.json();
          if (data.success) {
            showToast('Command saved: /' + name, 'success');
            cmdPageState.editorContent = content;
            cmdPageState.savedContent = content;
            cmdPageState.isDirty = false;
          } else { showToast('Failed: ' + (data.error || '') + ' - ' + (data.message || 'Unknown error'), 'error'); }
        } catch (error) { showToast('API error: ' + error.message, 'error'); }
      }, { danger: false });
    }

    function deleteCommand(name) {
      showConfirmDialog('Delete command?', 'Delete /' + name + ' from ' + cmdPageState.dirPath + '? This cannot be undone.', 'Delete', async function() {
        try {
          var cPp = cmdPageState.scope === 'project' ? projectPathParam(cmdPageState.projectPath) : '';
          var res = await fetch('/api/claude-files/commands/' + cmdPageState.scope + '/' + encodeURIComponent(name) + cPp, { method: 'DELETE' });
          var data = await res.json();
          if (data.success) {
            showToast('Command deleted: /' + name, 'success');
            cmdPageState.selected = null;
            cmdPageState.editorContent = '';
            cmdPageState.savedContent = '';
            cmdPageState.isDirty = false;
            renderCommandsPage();
          } else { showToast('Failed: ' + (data.error || '') + ' - ' + (data.message || 'Unknown error'), 'error'); }
        } catch (error) { showToast('API error: ' + error.message, 'error'); }
      }, { danger: true });
    }

    // =========================================================================

    // =========================================================================
    let agentPageState = {

      projectPath: '', // selected project path for project scope
      selected: null,   // { name, type }
      files: [],
      agentsDir: '',
      skillsDir: '',
      editorContent: '',
      isNew: false,
      newName: '',
      newType: 'agent',

    /** Check if Agents editor has unsaved changes; returns true if safe to proceed */

        callback();

    async function renderAgentsPage() {
