          const replyBtn = document.getElementById('reply-btn');
          const replyMessage = document.getElementById('reply-message');

          // AC-INPUT-1: Enter to send, Shift+Enter for newline
          replyBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              replyForm.dispatchEvent(new Event('submit', { cancelable: true }));
            }
          });

          replyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const taskId = replyForm.dataset.taskId;
            const reply = replyBox.value.trim();

            if (!reply) {
              replyMessage.innerHTML = '<div class="error-message">Please enter a reply.</div>';
              return;
            }

            replyBtn.disabled = true;
            replyBtn.textContent = 'Sending...';

            try {
              const result = await api('/tasks/' + encodeURIComponent(taskId) + '/reply', {
                method: 'POST',
                body: JSON.stringify({ reply }),
              });

              replyMessage.innerHTML = '<div class="success-message">Reply sent! Task resumed.</div>';
              replyBox.value = '';

              // Refresh task detail after short delay
              setTimeout(() => {
                renderTaskDetail(taskId);
              }, 1000);
            } catch (error) {
              replyMessage.innerHTML = '<div class="error-message">Error: ' + escapeHtml(error.message) + '</div>';
            } finally {
              replyBtn.disabled = false;
              replyBtn.textContent = 'Send Reply';
            }
          });
        }

        // Setup continue form for ERROR/CANCELLED tasks
        const continueForm = document.getElementById('continue-form');
        if (continueForm) {
          const continueBox = document.getElementById('continueBox');
          const continueBtn = document.getElementById('continue-btn');
          const continueMessage = document.getElementById('continue-message');

          continueBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              continueForm.dispatchEvent(new Event('submit', { cancelable: true }));
            }
          });

          continueForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const taskId = continueForm.dataset.taskId;
            const prompt = continueBox.value.trim();

            if (!prompt) {
              continueMessage.innerHTML = '<div class="error-message">Please enter instructions to continue.</div>';
              return;
            }

            continueBtn.disabled = true;
            continueBtn.textContent = 'Sending...';

            try {
              // Use the reply endpoint to resume the task with new instructions
              const result = await api('/tasks/' + encodeURIComponent(taskId) + '/reply', {
                method: 'POST',
                body: JSON.stringify({ reply: prompt }),
              });

              continueMessage.innerHTML = '<div class="success-message">Task resumed with new instructions!</div>';
              continueBox.value = '';

              setTimeout(() => {
                renderTaskDetail(taskId);
              }, 1000);
            } catch (error) {
              continueMessage.innerHTML = '<div class="error-message">Error: ' + escapeHtml(error.message) + '</div>';
            } finally {
              continueBtn.disabled = false;
              continueBtn.textContent = 'Continue Task';
            }
          });
        }

        // Setup follow-up form for COMPLETE tasks
        const followupForm = document.getElementById('followup-form');
        if (followupForm) {
          const followupBox = document.getElementById('followupBox');
          const followupBtn = document.getElementById('followup-btn');
          const followupMessage = document.getElementById('followup-message');
          const followupProjectId = followupForm.dataset.projectId;
          const followupTaskGroupId = followupForm.dataset.taskGroupId;

          followupBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              followupForm.dispatchEvent(new Event('submit', { cancelable: true }));
            }
          });

          followupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = followupBox.value.trim();

            if (!content) {
              followupMessage.innerHTML = '<div class="error-message">Please enter follow-up instructions.</div>';
              return;
            }

            if (!followupProjectId) {
              followupMessage.innerHTML = '<div class="error-message">No project associated with this task group. Cannot send follow-up.</div>';
              return;
            }

            followupBtn.disabled = true;
            followupBtn.textContent = 'Sending...';

            try {
              const data = await api('/projects/' + encodeURIComponent(followupProjectId) + '/chat', {
                method: 'POST',
                body: JSON.stringify({
                  content: content,
                  taskGroupId: followupTaskGroupId
                }),
              });

              followupMessage.innerHTML = '<div class="success-message">Follow-up task created in same group!</div>';
              followupBox.value = '';

              showToast('Follow-up task created', 'success');

              // Navigate to the chat view for this project with the task group
              setTimeout(() => {
                navigate('/chat/' + encodeURIComponent(followupProjectId) + '?taskGroupId=' + encodeURIComponent(followupTaskGroupId));
              }, 1000);
            } catch (error) {
              followupMessage.innerHTML = '<div class="error-message">Error: ' + escapeHtml(error.message) + '</div>';
            } finally {
              followupBtn.disabled = false;
              followupBtn.textContent = 'Send Follow-up';
            }
          });
        }
      } catch (error) {
        app.innerHTML = `
          <div class="page-header">
            <h2>Task Detail</h2>
            <a href="/" class="back-btn" onclick="event.preventDefault(); navigate('/')">← Back</a>
          </div>
          <div class="card">
            <div class="error-message">Error: ${escapeHtml(error.message)}</div>
            <button class="btn btn-secondary" onclick="renderTaskDetail('${escapeHtml(taskId)}')">Retry</button>
          </div>
        `;
      }
    }

    // Render new command form
    async function renderNewCommandForm(prefilledGroup = '') {
      let taskGroups = [];
      try {
        const data = await api('/task-groups');
        taskGroups = data.task_groups || [];
      } catch (error) {
        // Ignore - we can still create new task groups
      }

      const options = taskGroups.length > 0
        ? taskGroups.map(g => `<option value="${escapeHtml(g.task_group_id)}">${escapeHtml(g.task_group_id)}</option>`).join('')
        : '';

      const backBtn = `<a href="/" class="back-btn" onclick="event.preventDefault(); navigate('/')">← Back to Groups</a>`;

      app.innerHTML = `
        <div class="page-header">
          <h2>New Command</h2>
          ${backBtn}
        </div>

        <div class="card">
          <form id="new-command-form">
            <div class="form-group">
              <label for="task_group_id">Task Group ID</label>
              <input type="text" id="task_group_id" name="task_group_id"
                placeholder="Enter new or select existing"
                list="task-groups-list"
                value="${escapeHtml(prefilledGroup)}"
                required>
              <datalist id="task-groups-list">
                ${options}
              </datalist>
            </div>

            <div class="form-group">
              <label for="prompt">Command / Prompt</label>
              <textarea id="prompt" name="prompt"
                placeholder="Enter your command or prompt here..." required></textarea>
            </div>

            <div id="form-message"></div>

            <button type="submit" class="btn btn-primary" id="submit-btn">Submit to Queue</button>
          </form>
        </div>

        <div class="card" style="background: #fffbeb; border-left: 4px solid #f59e0b;">
          <p style="color: #92400e; font-size: 0.9rem;">
            <strong>Note:</strong> This adds a task to the queue. The Runner will pick it up and execute it automatically.
          </p>
        </div>
      `;

      // Form submission
      document.getElementById('new-command-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const submitBtn = document.getElementById('submit-btn');
        const messageDiv = document.getElementById('form-message');

        const taskGroupId = form.task_group_id.value.trim();
        const prompt = form.prompt.value.trim();

        if (!taskGroupId || !prompt) {
          messageDiv.innerHTML = '<div class="error-message">Please fill in all fields.</div>';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        try {
          const result = await api('/tasks', {
            method: 'POST',
            body: JSON.stringify({ task_group_id: taskGroupId, prompt }),
          });

          messageDiv.innerHTML = `
            <div class="success-message">
              Task queued successfully!<br>
              Task ID: <strong>${escapeHtml(result.task_id)}</strong>
            </div>
          `;

          // Clear prompt only
          form.prompt.value = '';

          // Navigate to task detail after delay
          setTimeout(() => {
            navigate(`/tasks/${encodeURIComponent(result.task_id)}`);
          }, 1000);
        } catch (error) {
          messageDiv.innerHTML = `<div class="error-message">Error: ${escapeHtml(error.message)}</div>`;
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit to Queue';
        }
      });
    }

    // Cancel task
    async function cancelTask(taskId) {
      if (!confirm('Are you sure you want to cancel this task?')) {
        return;
      }

      try {
        const result = await fetch(`/api/tasks/${encodeURIComponent(taskId)}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'CANCELLED' }),
        });

        const data = await result.json();

        if (!result.ok) {
          showToast(data.message || 'Failed to cancel task', 'error');
          return;
        }

        // Refresh the task detail page
        renderTaskDetail(taskId);
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function changeTaskStatus(taskId) {
      const select = document.getElementById('status-change-select');
      const newStatus = select?.value;
      if (!newStatus) {
        showToast('Please select a status', 'warning');
        return;
      }
      const msgEl = document.getElementById('status-change-message');
      try {
        const result = await fetch(`/api/tasks/${encodeURIComponent(taskId)}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus }),
        });
        const data = await result.json();
        if (!result.ok) {
          if (msgEl) msgEl.innerHTML = `<span style="color:#ef4444;">${escapeHtml(data.message || 'Failed')}</span>`;
          return;
        }
        if (msgEl) msgEl.innerHTML = `<span style="color:#22c55e;">Status changed: ${escapeHtml(data.old_status)} → ${escapeHtml(data.new_status)}</span>`;
        setTimeout(() => renderTaskDetail(taskId), 500);
      } catch (error) {
        if (msgEl) msgEl.innerHTML = `<span style="color:#ef4444;">${escapeHtml(error.message)}</span>`;
      }
    }

    async function rejudgeTask(taskId) {
      const btn = document.getElementById('rejudge-btn');
      const msgEl = document.getElementById('status-change-message');
      if (btn) { btn.disabled = true; btn.textContent = 'Judging...'; }
      try {
        const result = await fetch(`/api/tasks/${encodeURIComponent(taskId)}/rejudge`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        const data = await result.json();
        if (!result.ok) {
          if (msgEl) msgEl.innerHTML = `<span style="color:#ef4444;">${escapeHtml(data.message || 'Failed')}</span>`;
          if (btn) { btn.disabled = false; btn.textContent = 'Re-judge (LLM)'; }
          return;
        }
        const changed = data.old_status !== data.new_status;
        const reasoning = data.llm_result?.reasoning || '';
        if (msgEl) msgEl.innerHTML = `
          <div style="background:#f0fdf4; border:1px solid #86efac; border-radius:6px; padding:8px 12px; font-size:0.9rem;">
            <strong>LLM Judgment:</strong> hasQuestions=${data.llm_result?.hasQuestions ? 'true' : 'false'}
            ${data.llm_result?.usedProvider ? `<br>Provider: ${escapeHtml(data.llm_result.usedProvider)}/${escapeHtml(data.llm_result.usedModel || 'default')}` : '<br>Provider: regex fallback'}
            ${data.llm_result?.questionSummary ? `<br>Question: "${escapeHtml(data.llm_result.questionSummary)}"` : ''}
            <br>Reasoning: ${escapeHtml(reasoning)}
            ${changed ? `<br><strong style="color:#22c55e;">Status changed: ${escapeHtml(data.old_status)} → ${escapeHtml(data.new_status)}</strong>` : `<br>Status unchanged: ${escapeHtml(data.new_status)}`}
          </div>`;
        if (changed) setTimeout(() => renderTaskDetail(taskId), 1500);
        else if (btn) { btn.disabled = false; btn.textContent = 'Re-judge (LLM)'; }
      } catch (error) {
        if (msgEl) msgEl.innerHTML = `<span style="color:#ef4444;">${escapeHtml(error.message)}</span>`;
        if (btn) { btn.disabled = false; btn.textContent = 'Re-judge (LLM)'; }
      }
    }

    // Settings state
    let settingsScope = 'global'; // 'global' | 'project'
    let settingsSection = 'app'; // 'app' | 'claude' | 'instructions' | 'effective'
    let claudeSettingsAdvancedJson = false; // toggle for advanced JSON editor in Claude Settings
    let settingsData = {
      apiKeys: { anthropic: null, openai: null },
      globalSettings: { llm: {}, preferences: {}, maxTokens: 4096, temperature: 0.7 },
      projectOverrides: {},
      namespace: '',
      internalLlm: { provider: null, model: null, defaults: { openai: 'gpt-4o-mini', anthropic: 'claude-haiku-4-5-20251001' } },
      claudeProjectSettings: { exists: false, path: '', settings: {} },
      claudeGlobalSettings: { exists: false, path: '', settings: {} },
      claudeMdProject: { exists: false, path: '', content: '' },
      claudeMdGlobal: { exists: false, path: '', content: '' },
      templates: [],
    };

    // Render Settings page - main dispatcher
    async function renderSettings() {
      app.innerHTML = '<div class="loading">Loading Settings...</div>';

      try {
        // Fetch all settings data in parallel
        const [apiKeyRes, projectRes, namespaceRes, claudeProjRes, claudeGlobalRes, claudeMdProjRes, claudeMdGlobalRes] = await Promise.all([
          fetch('/api/settings/api-key/status'),
          fetch('/api/settings/project'),
          fetch('/api/namespace'),
          fetch('/api/claude-settings/project'),
          fetch('/api/claude-settings/global'),
          fetch('/api/claude-settings/claude-md/project'),
          fetch('/api/claude-settings/claude-md/global'),
        ]);

        settingsData.apiKeys = await apiKeyRes.json();
        const projectData = await projectRes.json();
        const namespaceData = await namespaceRes.json();
        settingsData.namespace = namespaceData.namespace;

        // Internal LLM settings (non-fatal: page works even if this fails)
        try {
          const qdRes = await fetch('/api/settings/internal-llm');
          if (qdRes.ok) settingsData.internalLlm = await qdRes.json();
        } catch { /* use defaults */ }

        settingsData.globalSettings = {
          llm: projectData.llm || { provider: 'anthropic', model: 'claude-sonnet-4-20250514' },
          preferences: projectData.preferences || {},
          maxTokens: 4096,
          temperature: 0.7
        };
        settingsData.projectOverrides = projectData.overrides || {};

        if (claudeProjRes.ok) settingsData.claudeProjectSettings = await claudeProjRes.json();
        if (claudeGlobalRes.ok) settingsData.claudeGlobalSettings = await claudeGlobalRes.json();
        if (claudeMdProjRes.ok) settingsData.claudeMdProject = await claudeMdProjRes.json();
        if (claudeMdGlobalRes.ok) settingsData.claudeMdGlobal = await claudeMdGlobalRes.json();

        // Load templates (non-fatal)
        try {
          const tplRes = await fetch('/api/templates');
          if (tplRes.ok) {
            const tplData = await tplRes.json();
            settingsData.templates = tplData.templates || [];
          }
        } catch { /* use defaults */ }

        renderSettingsPage();
      } catch (error) {
        app.innerHTML = '<div class="card"><h2>Error Loading Settings</h2><p>' + escapeHtml(error.message) + '</p><button class="btn btn-primary" onclick="renderSettings()" style="margin-top:16px;">Retry</button></div>';
      }
    }

    // Render the settings page shell with scope selector + section nav
    function renderSettingsPage() {
      const scopeButtons = [
        { id: 'global', label: 'Global' },
        { id: 'project', label: 'Project' },
        { id: 'local', label: 'Local', disabled: true },
      ];
      const sectionButtons = [
        { id: 'app', label: 'App Settings', icon: '\u2699\uFE0F' },
        { id: 'templates', label: 'Templates', icon: '\uD83D\uDCC4' },
        { id: 'claude', label: 'Claude Settings', icon: '\uD83D\uDCCB' },
        { id: 'instructions', label: 'Claude Instructions', icon: '\uD83D\uDCDD' },
        { id: 'effective', label: 'Effective', icon: '\uD83D\uDD0D' },
      ];

      app.innerHTML = `
        <div class="settings-page" data-testid="settings-root" data-scope="${settingsScope}">
          <div class="page-header">
            <h2>Settings</h2>
            <span class="project-indicator">Project: ${escapeHtml(settingsData.namespace)}</span>
            <button class="refresh-btn" onclick="renderSettings()">Refresh</button>
          </div>

          <!-- Scope Selector -->
          <div class="settings-scope-selector" data-testid="settings-tabs">
            <label class="scope-label">Scope:</label>
            ${scopeButtons.map(s =>
              '<button class="scope-btn' + (settingsScope === s.id ? ' active' : '') + (s.disabled ? ' disabled' : '') + '" ' +
              (s.disabled ? 'disabled title="Coming soon"' : 'onclick="switchSettingsScope(\'' + s.id + '\')"') +
              ' data-testid="settings-tab-' + s.id + '">' + s.label +
              (s.disabled ? ' <span style="font-size:0.7rem;opacity:0.6;">Coming soon</span>' : '') + '</button>'
            ).join('')}
          </div>

          <!-- Section Nav -->
          <div class="settings-section-nav" data-testid="settings-section-nav">
            ${sectionButtons.map(s =>
              '<button class="section-btn' + (settingsSection === s.id ? ' active' : '') + '" onclick="switchSettingsSection(\'' + s.id + '\')" data-testid="section-btn-' + s.id + '">' +
              '<span class="section-icon">' + s.icon + '</span> ' + s.label + '</button>'
            ).join('')}
          </div>

          <!-- Content area -->
          <div id="settings-content"></div>
        </div>
        ${getSettingsStyles()}
      `;

      renderSettingsContent();
    }

    function switchSettingsScope(scope) {
      settingsScope = scope;
      renderSettingsPage();
    }

    function switchSettingsSection(section) {
      settingsSection = section;
      renderSettingsContent();
      // Update active state
      document.querySelectorAll('.section-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.querySelector('[data-testid="section-btn-' + section + '"]');
      if (activeBtn) activeBtn.classList.add('active');
    }

    function renderSettingsContent() {
      const container = document.getElementById('settings-content');
      if (!container) return;
      switch (settingsSection) {
        case 'app': renderAppSettings(container); break;
        case 'templates': renderTemplatesSettings(container); break;
        case 'claude': renderClaudeSettings(container); break;
        case 'instructions': renderClaudeInstructions(container); break;
        case 'effective': renderEffectiveSettings(container); break;
        default: renderAppSettings(container);
      }
    }

      const rulesLineCount = rulesText.split('\n').length;
      const outputLineCount = outputText.split('\n').length;

      return `
        <div class="template-card" data-template-id="${escapedId}">

            <div class="template-full-section">
              <div class="template-full-label">Input Rules ${rulesText ? '<span style="font-weight:normal;color:#6b7280;font-size:0.75rem;">(' + rulesText.length + ' chars, ' + rulesLineCount + ' lines)</span>' : ''}</div>
              ${isBuiltIn
                ? '<textarea class="template-full-textarea" id="' + cardId + '-rules" rows="' + Math.max(8, rulesLineCount + 2) + '" readonly style="opacity:0.8;cursor:default;">' + escapeHtml(rulesText || '(empty)') + '</textarea>'
                : '<textarea class="template-full-textarea" id="' + cardId + '-rules" rows="' + Math.max(8, rulesLineCount + 2) + '">' + escapeHtml(rulesText) + '</textarea>'
              }
            </div>
            <div class="template-full-section">
              <div class="template-full-label">Output Format ${outputText ? '<span style="font-weight:normal;color:#6b7280;font-size:0.75rem;">(' + outputText.length + ' chars, ' + outputLineCount + ' lines)</span>' : ''}</div>
              ${isBuiltIn
                ? '<textarea class="template-full-textarea" id="' + cardId + '-output" rows="' + Math.max(6, outputLineCount + 2) + '" readonly style="opacity:0.8;cursor:default;">' + escapeHtml(outputText || '(empty)') + '</textarea>'
                : '<textarea class="template-full-textarea" id="' + cardId + '-output" rows="' + Math.max(6, outputLineCount + 2) + '">' + escapeHtml(outputText) + '</textarea>'
              }
            </div>
            ${!isBuiltIn ? '<div style="margin-top:8px;text-align:right;"><button class="btn btn-primary btn-sm" onclick="saveTemplateInline(\'' + escapedId + '\', \'' + cardId + '\')">Save Changes</button></div>' : ''}

          <div class="template-card-actions">
            ${isBuiltIn
              ? '<button class="btn btn-sm" onclick="copyTemplate(\'' + escapedId + '\', \'' + escapeHtml(template.name) + '\')">Copy</button>'
              : '<button class="btn btn-sm" onclick="openTemplateEditor(\'' + escapedId + '\')">Edit in Modal</button>' +
                '<button class="btn btn-sm btn-danger" onclick="deleteTemplate(\'' + escapedId + '\', \'' + escapeHtml(template.name) + '\')">Delete</button>'
            }
          </div>
        </div>
      `;
    }

    function toggleTemplateContent(cardId) {
      var el = document.getElementById(cardId);
      if (!el) return;
      var btn = el.parentElement.querySelector('.template-expand-btn');
      if (el.style.display === 'none') {
        el.style.display = 'block';
        if (btn) btn.textContent = 'Hide Content';
      } else {
        el.style.display = 'none';
        if (btn) btn.textContent = 'Show Content';
      }
    }

    /**
     * Save template content inline from the expanded card view.
     */
    async function saveTemplateInline(templateId, cardId) {
      var rulesEl = document.getElementById(cardId + '-rules');
      var outputEl = document.getElementById(cardId + '-output');
      if (!rulesEl || !outputEl) return;

      try {
        var response = await fetch('/api/templates/' + encodeURIComponent(templateId), {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            rulesText: rulesEl.value,
            outputFormatText: outputEl.value,
          }),
        });
        var data = await response.json();
        if (data.error) throw new Error(data.message);

        showToast('Template saved successfully', 'success');
        // Refresh templates data and re-render
        try {
          var tplRes = await fetch('/api/templates');
          if (tplRes.ok) {
            var tplData = await tplRes.json();
            settingsData.templates = tplData.templates || [];
          }
        } catch (e) { /* ignore reload failure */ }
        renderSettingsContent();
      } catch (err) {
        showToast('Failed to save template: ' + err.message, 'error');
      }
    }

      if (templateId) {
        template = (settingsData.templates || []).find(function(t) { return t.id === templateId; });

      var modal = document.createElement('div');
      modal.id = 'template-editor-modal';
      modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000;';
      modal.innerHTML =
        '<div style="background: var(--bg-primary, #1a1a2e); color: var(--text-primary, #e0e0e0); padding: 24px; border-radius: 12px; max-width: 800px; width: 95%; max-height: 85vh; overflow-y: auto;">' +
          '<h3 style="margin-bottom: 16px;">' + (template ? 'Edit Template' : 'New Template') + '</h3>' +
          '<div class="form-group" style="margin-bottom: 12px;">' +
            '<label style="display:block;margin-bottom:4px;font-weight:600;">Template Name</label>' +
            '<input type="text" id="tpl-edit-name" class="settings-input" placeholder="my-project-rules" value="' + escapeHtml(template ? template.name : '') + '" style="width:100%;" />' +

          '</div>' +

            '<textarea id="tpl-edit-rules" rows="10" style="font-family: monospace; width: 100%; background: var(--bg-secondary, #16213e); color: var(--text-primary, #e0e0e0); border: 1px solid var(--border-color, #2a2a4a); border-radius: 6px; padding: 8px;">' + escapeHtml(template ? template.rulesText : '') + '</textarea>' +
            '<span style="font-size:0.75rem;color:#9ca3af;">Max 10,000 chars. This text is prepended to every task prompt for projects using this template.</span>' +

            '<textarea id="tpl-edit-output" rows="8" style="font-family: monospace; width: 100%; background: var(--bg-secondary, #16213e); color: var(--text-primary, #e0e0e0); border: 1px solid var(--border-color, #2a2a4a); border-radius: 6px; padding: 8px;">' + escapeHtml(template ? template.outputFormatText : '') + '</textarea>' +
            '<span style="font-size:0.75rem;color:#9ca3af;">Max 5,000 chars. Defines the expected output format (language, structure, evidence requirements).</span>' +
          '</div>' +
          '<div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 16px;">' +
            '<button class="btn btn-secondary" onclick="closeTemplateEditor()">Cancel</button>' +
            '<button class="btn btn-primary" onclick="saveTemplateFromEditor(\'' + (template ? escapeHtml(template.id) : '') + '\')">' + (template ? 'Update' : 'Create') + '</button>' +
          '</div>' +
        '</div>';

      document.body.appendChild(modal);
      modal.addEventListener('click', function(e) { if (e.target === modal) closeTemplateEditor(); });
    }

    function closeTemplateEditor() {
      var modal = document.getElementById('template-editor-modal');
      if (modal) modal.remove();
    }

    async function saveTemplateFromEditor(templateId) {
      var name = document.getElementById('tpl-edit-name').value.trim();
      var rulesText = document.getElementById('tpl-edit-rules').value;
      var outputFormatText = document.getElementById('tpl-edit-output').value;

      if (!name) { showToast('Template name is required', 'error'); return; }

      try {
        var url = templateId ? '/api/templates/' + encodeURIComponent(templateId) : '/api/templates';
        var method = templateId ? 'PUT' : 'POST';

        var response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name, rulesText: rulesText, outputFormatText: outputFormatText })
        });

        var data = await response.json();
        if (data.error) throw new Error(data.message);

        closeTemplateEditor();
        showToast('Template ' + (templateId ? 'updated' : 'created') + ' successfully', 'success');

        // Refresh templates list
        var tplRes = await fetch('/api/templates');
        if (tplRes.ok) {
          var tplData = await tplRes.json();
          settingsData.templates = tplData.templates || [];
        }
        renderSettingsContent();
      } catch (error) {
        showToast('Error: ' + error.message, 'error');
      }
    }

    async function deleteTemplate(templateId, templateName) {
      if (!confirm('Delete template "' + templateName + '"? This cannot be undone.')) return;

      try {
        var response = await fetch('/api/templates/' + encodeURIComponent(templateId), { method: 'DELETE' });
        var data = await response.json();
        if (data.error) throw new Error(data.message);

        showToast('Template deleted', 'success');

        var tplRes = await fetch('/api/templates');
        if (tplRes.ok) {
          var tplData = await tplRes.json();
          settingsData.templates = tplData.templates || [];
        }
        renderSettingsContent();
      } catch (error) {
        showToast('Error: ' + error.message, 'error');
      }
    }

    async function copyTemplate(templateId, templateName) {
      var newName = prompt('Name for the copy:', templateName + '-copy');
      if (!newName) return;

      try {
        var response = await fetch('/api/templates/' + encodeURIComponent(templateId) + '/copy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: newName })
        });
        var data = await response.json();
        if (data.error) throw new Error(data.message);

        showToast('Template copied as "' + newName + '"', 'success');

        var tplRes = await fetch('/api/templates');
        if (tplRes.ok) {
          var tplData = await tplRes.json();
          settingsData.templates = tplData.templates || [];
        }
        renderSettingsContent();
      } catch (error) {
        showToast('Error: ' + error.message, 'error');
      }
    }

      const settingsJson = JSON.stringify(currentSettings, null, 2);

      // Known settings fields for form view
      const permissions = currentSettings.permissions || {};
      const allowList = permissions.allow || [];
      const denyList = permissions.deny || [];
      const allowedTools = (currentSettings.allowedTools || []).join('\\n');
      const customInstructions = currentSettings.customInstructions || '';
      const hooks = currentSettings.hooks || {};
      const mcpServers = currentSettings.mcpServers || {};

      // Known permission items
      const knownPermissions = [
        'Bash', 'Read', 'Write', 'Edit', 'Glob', 'Grep', 'WebFetch',
        'TodoRead', 'TodoWrite', 'Task', 'MultiTool',
        'mcp__*', 'Bash(npm *)', 'Bash(git *)', 'Bash(npx *)'

      if (claudeSettingsAdvancedJson) {
        // Advanced JSON editor mode
        container.innerHTML = `
          <div class="card settings-section">

              ${isProject ? 'Project-level Claude Code settings.' : 'Global Claude Code settings. Applies to all projects.'}

              ${data.exists ? '<span class="badge badge-complete" style="margin-left:8px;">File exists</span>' : '<span class="badge badge-cancelled" style="margin-left:8px;">File not found (will be created on save)</span>'}
            </div>
            <label class="advanced-toggle" onclick="toggleClaudeSettingsMode()">
              <input type="checkbox" checked /> Advanced JSON Editor (click to switch to Form view)
            </label>
            <div class="form-group">
              <label for="claude-settings-editor">Edit JSON:</label>
              <textarea id="claude-settings-editor" class="claude-json-editor" style="width:100%;min-height:320px;font-family:'Monaco','Consolas',monospace;font-size:0.9rem;padding:12px;border:1px solid #d1d5db;border-radius:6px;resize:vertical;tab-size:2;white-space:pre;overflow-wrap:normal;overflow-x:auto;">${escapeHtml(settingsJson)}</textarea>

    // Save from form mode - collect form values and merge with original settings
    async function saveClaudeSettingsFromForm(scope) {
      const isProject = scope === 'project';
      const data = isProject ? settingsData.claudeProjectSettings : settingsData.claudeGlobalSettings;
      const original = JSON.parse(JSON.stringify(data.settings || {}));

      // Collect permissions.allow
      const allowChecks = document.querySelectorAll('#claude-perm-allow input[type="checkbox"]');
      const allowList = [];
      allowChecks.forEach(cb => { if (cb.checked) allowList.push(cb.value); });

      // Collect permissions.deny
      const denyChecks = document.querySelectorAll('#claude-perm-deny input[type="checkbox"]');
      const denyList = [];
      denyChecks.forEach(cb => { if (cb.checked) denyList.push(cb.value); });

      // Merge permissions
      if (allowList.length > 0 || denyList.length > 0) {
        original.permissions = original.permissions || {};
        if (allowList.length > 0) original.permissions.allow = allowList;
        else delete original.permissions.allow;
        if (denyList.length > 0) original.permissions.deny = denyList;
        else delete original.permissions.deny;
        if (Object.keys(original.permissions).length === 0) delete original.permissions;
      } else {
        delete original.permissions;
      }

      // Allowed tools
      const toolsText = document.getElementById('claude-allowed-tools')?.value || '';
      const tools = toolsText.split('\\n').map(t => t.trim()).filter(t => t.length > 0);
      if (tools.length > 0) original.allowedTools = tools;
      else delete original.allowedTools;

      // Custom instructions
      const instructions = document.getElementById('claude-custom-instructions')?.value || '';
      if (instructions.trim()) original.customInstructions = instructions;
      else delete original.customInstructions;

      // Save using existing logic
      const filePath = isProject ? (settingsData.claudeProjectSettings.path || '') : (settingsData.claudeGlobalSettings.path || '');
      showConfirmDialog(
        'Save settings.json?',
        'Save to: ' + filePath,
        'Save',
        async function() {
          try {
            const url = scope === 'project' ? '/api/claude-settings/project' : '/api/claude-settings/global';
            const response = await fetch(url, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ settings: original }),
            });
            const rdata = await response.json();
            if (rdata.success) {
              showToast('settings.json saved successfully', 'success');
              renderSettings();
            } else {
              showToast(rdata.message || 'Failed to save settings.json', 'error');
            }
          } catch (error) {
            showToast(error.message, 'error');
          }
        },
        { danger: false }
      );
    }

    // ===================
    // Effective Settings section (read-only merged view)
    // ===================
    function renderEffectiveSettings(container) {
      const globalSettings = settingsData.claudeGlobalSettings?.settings || {};
      const projectSettings = settingsData.claudeProjectSettings?.settings || {};

      // Merge: project overrides global
      const merged = {};
      const allKeys = [...new Set([...Object.keys(globalSettings), ...Object.keys(projectSettings)])].sort();

      let rows = '';
      allKeys.forEach(key => {
        const inProject = key in projectSettings;
        const inGlobal = key in globalSettings;
        const source = inProject ? 'PROJECT' : 'GLOBAL';
        const sourceClass = inProject ? 'source-project' : 'source-global';
        const value = inProject ? projectSettings[key] : globalSettings[key];
        const valueStr = JSON.stringify(value, null, 2);
        const overrideNote = (inProject && inGlobal) ? ' <span class="override-note">(overrides Global)</span>' : '';
        rows += '<div class="effective-row">' +
          '<div class="effective-key"><code>' + escapeHtml(key) + '</code> <span class="source-badge ' + sourceClass + '">' + source + '</span>' + overrideNote + '</div>' +
          '<pre class="effective-value">' + escapeHtml(valueStr) + '</pre>' +
          '</div>';
      });

      container.innerHTML = `
        <div class="card settings-section">
          <h3>Effective Claude Settings (Read-only)</h3>
          <p class="settings-hint">This shows the merged result of Global + Project settings.json. Project values override Global values.</p>

            <strong>Priority:</strong> Local > Project > Global
          </div>
          ${rows || '<p style="color:#6b7280;">No settings found.</p>'}

      `;
    }

    function previewClaudeMd(scope) {
      const editorId = scope === 'project' ? 'claude-md-project-editor' : 'claude-md-global-editor';
      const editor = document.getElementById(editorId);
      if (!editor) return;
      const raw = editor.value;
      const previewPane = document.getElementById('claude-md-preview-pane');
      const previewContent = document.getElementById('claude-md-preview-content');
      if (!previewPane || !previewContent) return;
      // Simple markdown rendering (headers, bold, code blocks, lists)
      let html = escapeHtml(raw);
      // Code blocks (```)
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre style="background:#1f2937;color:#e5e7eb;padding:12px;border-radius:6px;overflow-x:auto;"><code>$2</code></pre>');
      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code style="background:#f3f4f6;padding:2px 6px;border-radius:3px;font-size:0.9em;">$1</code>');
      // Headers
      html = html.replace(/^### (.+)$/gm, '<h3 style="margin:16px 0 8px;font-size:1.1rem;">$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2 style="margin:20px 0 8px;font-size:1.3rem;">$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1 style="margin:24px 0 8px;font-size:1.5rem;">$1</h1>');
      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Italic
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // Unordered lists
      html = html.replace(/^- (.+)$/gm, '<li style="margin-left:20px;">$1</li>');
      // Line breaks
      html = html.replace(/\n/g, '<br>');
      previewContent.innerHTML = html;
      previewPane.style.display = '';
    }

    // ===================
    // Runner Controls (AC-RC-UI-1, AC-RC-API-1)
    // ===================
    let runnerControlsState = {
      isRunning: false,
      pid: null,
      build_sha: null,
      build_timestamp: null,
      isOperationInProgress: false
    };

    // Load runner status from API
    async function loadRunnerControlsStatus() {
      try {
        const response = await fetch('/api/runner/status');
        if (!response.ok) throw new Error('Failed to fetch runner status');
        const data = await response.json();
        
        runnerControlsState.isRunning = data.isRunning;
        runnerControlsState.pid = data.pid;
        runnerControlsState.build_sha = data.build_sha;
        runnerControlsState.build_timestamp = data.build_timestamp;
        
        updateRunnerControlsUI();
      } catch (error) {
        console.warn('Failed to load runner status:', error);
        // Still update UI to show error state
        runnerControlsState.isRunning = false;
        updateRunnerControlsUI();
      }
    }

    // Update Runner Controls UI based on state
    function updateRunnerControlsUI() {
      const dot = document.getElementById('runner-status-dot');
      const label = document.getElementById('runner-status-label');
      const detail = document.getElementById('runner-status-detail');
      const btnBuild = document.getElementById('btn-runner-build');
      const btnRestart = document.getElementById('btn-runner-restart');
      const btnStop = document.getElementById('btn-runner-stop');
      
      if (!dot || !label) return; // Not on settings page
      
      const { isRunning, pid, build_sha, build_timestamp, isOperationInProgress } = runnerControlsState;
      
      // Update status indicator
      if (isOperationInProgress) {
        dot.className = 'status-dot building';
        label.textContent = 'Operation in progress...';
        detail.textContent = '';
      } else if (isRunning) {
        dot.className = 'status-dot running';
        label.textContent = 'Running';
        let detailText = pid ? 'PID: ' + pid : '';
        if (build_sha) {
          detailText += (detailText ? ' | ' : '') + 'Build: ' + build_sha;
        }
        if (build_timestamp) {
          const ts = new Date(build_timestamp).toLocaleString();
          detailText += (detailText ? ' | ' : '') + 'Built: ' + ts;
        }
        detail.textContent = detailText;
      } else {
        dot.className = 'status-dot stopped';
        label.textContent = 'Stopped';
        detail.textContent = 'Runner is not running';
      }
      
      // Update button states
      // E1-1: Build & Restart should work even when stopped (allows fresh rebuild)
      if (btnBuild) btnBuild.disabled = isOperationInProgress;
      if (btnRestart) btnRestart.disabled = isOperationInProgress; // Always enabled unless op in progress
      if (btnStop) btnStop.disabled = isOperationInProgress || !isRunning; // Only when running
    }

    // Show operation result
    function showRunnerResult(success, message, output) {
      const resultDiv = document.getElementById('runner-controls-result');
      if (!resultDiv) return;
      
      resultDiv.style.display = 'block';
      resultDiv.className = 'runner-controls-result ' + (success ? 'success' : 'error');
      
      let html = '<strong>' + (success ? 'Success' : 'Error') + ':</strong> ' + escapeHtml(message);
      if (output) {
        html += '<pre>' + escapeHtml(output) + '</pre>';
      }
      resultDiv.innerHTML = html;
      
      // Auto-hide success messages after 5 seconds
      if (success) {
        setTimeout(() => {
          if (resultDiv) resultDiv.style.display = 'none';
        }, 5000);
      }
    }

    // Build action
    async function runnerBuild() {
      if (runnerControlsState.isOperationInProgress) return;
      
      runnerControlsState.isOperationInProgress = true;
      updateRunnerControlsUI();
      
      try {
        const response = await fetch('/api/runner/build', { method: 'POST' });
        const data = await response.json();
        
        if (data.success) {
          showRunnerResult(true, 'Build completed successfully', 'Build SHA: ' + (data.build_sha || 'N/A') + '\nDuration: ' + (data.duration_ms || 0) + 'ms');
          runnerControlsState.build_sha = data.build_sha;
          runnerControlsState.build_timestamp = data.build_timestamp;
        } else {
          showRunnerResult(false, data.message || 'Build failed', data.output || data.error);
        }
      } catch (error) {
        showRunnerResult(false, 'Build request failed', error.message);
      } finally {
        runnerControlsState.isOperationInProgress = false;
        await loadRunnerControlsStatus();
      }
    }

    // Restart action
    async function runnerRestart() {
      if (runnerControlsState.isOperationInProgress) return;
      if (!confirm('Restart the runner? This will briefly interrupt task processing.')) return;
      
      runnerControlsState.isOperationInProgress = true;
      updateRunnerControlsUI();
      
      try {
        const response = await fetch('/api/runner/restart', { method: 'POST' });
        const data = await response.json();
        
        if (data.success) {
          const info = 'Old PID: ' + (data.old_pid || 'N/A') + '\nNew PID: ' + (data.new_pid || 'N/A') + '\nBuild SHA: ' + (data.build_sha || 'N/A');
          showRunnerResult(true, 'Restart completed successfully', info);
        } else {
          showRunnerResult(false, data.message || 'Restart failed', data.output || data.error);
        }
      } catch (error) {
        showRunnerResult(false, 'Restart request failed', error.message);
      } finally {
        runnerControlsState.isOperationInProgress = false;
        await loadRunnerControlsStatus();
      }
    }

    // Stop action
    async function runnerStop() {
      if (runnerControlsState.isOperationInProgress) return;
      if (!confirm('Stop the runner? Task processing will stop until manually restarted.')) return;
      
      runnerControlsState.isOperationInProgress = true;
      updateRunnerControlsUI();
      
      try {
        const response = await fetch('/api/runner/stop', { method: 'POST' });
        const data = await response.json();
        
        if (data.success) {
          showRunnerResult(true, data.message || 'Runner stopped', 
            'Duration: ' + (data.duration_ms || 0) + 'ms');
        } else {
          showRunnerResult(false, data.message || 'Stop failed', data.error);
        }
      } catch (error) {
        showRunnerResult(false, 'Stop request failed', error.message);
      } finally {
        runnerControlsState.isOperationInProgress = false;
        await loadRunnerControlsStatus();
      }
    }

    // ===== Live Projects View =====
    var liveProjectsTimer = null;

    function startLiveProjectsRefresh() {
      stopLiveProjectsRefresh();
      liveProjectsTimer = setInterval(function() {
        if (currentPath === '/dashboard') {
          renderLiveProjects();
        }
      }, 10000);
    }

    function stopLiveProjectsRefresh() {
      if (liveProjectsTimer) {
        clearInterval(liveProjectsTimer);
        liveProjectsTimer = null;
      }
    }

    async function renderLiveProjects() {
      var container = document.getElementById('live-projects');
      if (!container) return;

      try {
        // Fetch projects and task groups in parallel
        var results = await Promise.all([
          api('/dashboard'),
          api('/task-groups')
        ]);
        var dashboardData = results[0];
        var taskGroupsData = results[1];

        var projects = dashboardData.projects || [];
        var taskGroups = taskGroupsData.task_groups || [];

        // Group active task groups by project_id
        var projectTasks = {};
        taskGroups.forEach(function(tg) {
          var pid = tg.project_id || '';
          if (!projectTasks[pid]) projectTasks[pid] = [];
          var sc = tg.status_counts || {};
          var hasActive = (sc.RUNNING || 0) + (sc.QUEUED || 0) + (sc.AWAITING_RESPONSE || 0);
          if (hasActive > 0 || tg.group_status === 'active') {
            projectTasks[pid].push(tg);
          }
        });

        // Filter to active projects or those with running tasks
        var activeProjects = projects.filter(function(p) {
          var pid = p.projectId;
          var tasks = projectTasks[pid] || [];
          return p.status === 'running' || tasks.length > 0;
        });

        // If no active projects, show the most recent ones
        if (activeProjects.length === 0) {
          activeProjects = projects.slice(0, 5);
        }

        if (activeProjects.length === 0) {
          container.innerHTML = '<div style="color:#6b7280; text-align:center; padding:20px;">No active projects</div>';
          return;
        }

        var html = '';
        activeProjects.forEach(function(project) {
          var pid = project.projectId;
          var tasks = projectTasks[pid] || [];
          var label = project.alias || project.projectPath || pid;
          if (label.length > 50) label = '...' + label.slice(-47);

          // Count running/queued tasks across groups
          var runningCount = 0;
          var queuedCount = 0;
          var awaitingCount = 0;
          tasks.forEach(function(tg) {
            var sc = tg.status_counts || {};
            runningCount += sc.RUNNING || 0;
            queuedCount += sc.QUEUED || 0;
            awaitingCount += sc.AWAITING_RESPONSE || 0;
          });

          var statusBadge = '';
          if (runningCount > 0) {
            statusBadge = '<span class="badge badge-running" style="font-size:0.7rem;">' + runningCount + ' running</span>';
          } else if (awaitingCount > 0) {
            statusBadge = '<span class="badge" style="font-size:0.7rem; background:#f59e0b; color:white;">' + awaitingCount + ' awaiting</span>';
          } else if (queuedCount > 0) {
            statusBadge = '<span class="badge badge-queued" style="font-size:0.7rem;">' + queuedCount + ' queued</span>';
          } else {
            statusBadge = '<span style="font-size:0.75rem; color:#6b7280;">idle</span>';
          }

          html += '<div class="card" style="margin-bottom:12px; padding:12px 16px;">';
          html += '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">';
          html += '<div style="font-weight:600; cursor:pointer;" onclick="navigate(\'/projects/' + encodeURIComponent(pid) + '\')">' + escapeHtml(label) + '</div>';
          html += '<div style="display:flex; gap:8px; align-items:center;">' + statusBadge;
          html += '<button class="btn btn-sm" style="font-size:0.75rem; padding:4px 10px;" onclick="navigate(\'/chat/' + encodeURIComponent(pid) + '\')">+ Task</button>';
          html += '</div></div>';

          // Show active task groups
          if (tasks.length > 0) {
            tasks.forEach(function(tg) {
              var sc = tg.status_counts || {};
              var running = sc.RUNNING || 0;
              var awaiting = sc.AWAITING_RESPONSE || 0;
              var tgLabel = tg.first_prompt || tg.task_group_id;
              if (tgLabel.length > 60) tgLabel = tgLabel.substring(0, 57) + '...';

              var statusIndicator = running > 0 ? '<span class="badge badge-running" style="font-size:0.65rem;">RUN</span>'
                : awaiting > 0 ? '<span class="badge" style="font-size:0.65rem; background:#f59e0b; color:white;">WAIT</span>'
                : '<span class="badge badge-queued" style="font-size:0.65rem;">Q</span>';

              html += '<div style="padding:6px 8px; margin:2px 0; background:#f9fafb; border-radius:4px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-size:0.85rem;" onclick="navigate(\'/task-groups/' + encodeURIComponent(tg.task_group_id) + '\')">';
              html += '<span style="display:flex; align-items:center; gap:6px;">' + statusIndicator + ' ' + escapeHtml(tgLabel) + '</span>';
              html += '<span style="font-size:0.75rem; color:#6b7280;">' + tg.task_count + ' task(s)</span>';
              html += '</div>';
            });
          } else {
            html += '<div style="font-size:0.8rem; color:#6b7280; padding:4px 8px;">No active tasks</div>';
          }

          html += '</div>';
        });

        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = '<div class="error-message">Failed to load live projects: ' + escapeHtml(e.message) + '</div>';
      }
    }

    // Show create project dialog
    async function showCreateProjectDialog() {
      showInputDialog('New Project', [
        { name: 'projectPath', label: 'Project Path', placeholder: '/path/to/your/project', required: true, hint: 'Absolute path to the project directory' },
        { name: 'alias', label: 'Alias', placeholder: 'my-project', hint: 'Optional short name for this project' },
      ], 'Create Project', async function(values) {
        try {
          const data = await api('/projects', {
            method: 'POST',
            body: JSON.stringify({ projectPath: values.projectPath, alias: values.alias || undefined }),
          });
          if (data.error) {
            showToast(data.message || data.error, 'error');
          } else {
            navigate('/projects/' + encodeURIComponent(data.projectId));
          }
        } catch (e) {
          showToast(e.message, 'error');
        }
      });
    }

    // Render Activity page
    async function renderActivity() {
      app.innerHTML = '<div class="loading">Loading Activity</div>';

      try {
        const data = await fetch('/api/activity?limit=50').then(r => r.json());
        const events = data.events || [];

        const eventItems = events.length > 0
          ? events.map(e => {
              const links = [];
              // Always show projectId (navigable link or N/A)
              if (e.projectId && e.projectId !== 'N/A') {
                links.push('<a href="#" onclick="event.preventDefault(); event.stopPropagation(); navigate(\'/projects/' + encodeURIComponent(e.projectId) + '\')" style="color: #2563eb; font-size: 0.8rem;">Project: ' + escapeHtml(e.projectAlias || e.projectId) + '</a>');
              } else {
                links.push('<span style="color: #9ca3af; font-size: 0.8rem;">Project: N/A</span>');
              }
              // Always show taskGroupId (navigable link or N/A)
              if (e.taskGroupId && e.taskGroupId !== 'N/A') {
                links.push('<a href="#" onclick="event.preventDefault(); event.stopPropagation(); navigate(\'/task-groups/' + encodeURIComponent(e.taskGroupId) + '\')" style="color: #2563eb; font-size: 0.8rem;">Group: ' + escapeHtml(e.taskGroupId.substring(0, 24)) + '</a>');
              } else {
                links.push('<span style="color: #9ca3af; font-size: 0.8rem;">Group: N/A</span>');
              }
              // Always show taskId (navigable link or N/A)
              if (e.taskId && e.taskId !== 'N/A') {
                links.push('<a href="#" onclick="event.preventDefault(); event.stopPropagation(); navigate(\'/tasks/' + encodeURIComponent(e.taskId) + '\')" style="color: #2563eb; font-size: 0.8rem;">Task: ' + escapeHtml(e.taskId.substring(0, 12)) + '...</a>');
              } else {
                links.push('<span style="color: #9ca3af; font-size: 0.8rem;">Task: N/A</span>');
              }
              return `
              <div class="log-entry ${e.importance === 'high' ? 'error' : ''}">
                <div class="log-time">${formatFullDate(e.timestamp)}</div>
                <div class="log-type">${escapeHtml(e.type)}</div>
                <div class="log-content">${escapeHtml(e.summary || '')}</div>
                <div style="font-size: 0.85rem; display: flex; gap: 12px; flex-wrap: wrap; margin-top: 2px;">${links.join('')}</div>
              </div>`;
            }).join('')
          : '<div class="empty-state"><p>No activity events yet.</p></div>';

        app.innerHTML = `
          <div class="page-header">
            <h2>Activity</h2>
            <button class="refresh-btn" onclick="renderActivity()">Refresh</button>
          </div>

          <div class="card">
            <h3>Recent Events</h3>
            ${eventItems}
          </div>
        `;
      } catch (error) {
        app.innerHTML = `
          <div class="card">
            <div class="error-message">Error: ${escapeHtml(error.message)}</div>
            <button class="btn btn-secondary" onclick="renderActivity()">Retry</button>
          </div>
        `;
      }
    }

    async function renderProjectDetail(projectId, resumeId) {
      app.innerHTML = '<div class="loading">Loading Project</div>';

      try {
        const [data, taskGroupsData, actionsData] = await Promise.all([
          fetch('/api/projects/' + encodeURIComponent(projectId) + '?excludeGroupStatus=archived,completed').then(r => r.json()),
          fetch('/api/task-groups').then(r => r.json()).catch(() => ({ task_groups: [] })),
          fetch('/api/required-actions').then(r => r.json()).catch(() => ({ actions: [] })),
        ]);
        if (data.error) throw new Error(data.message);

        const project = data.project;
        const sessions = data.sessions || [];
        const projectTaskGroupIds = new Set(data.taskGroupIds || []);
        const recentActivity = data.recentActivity || [];
        const projectRuns = data.runs || [];
        const recentTaskGroups = data.recentTaskGroups || [];
        const recentTasks = data.recentTasks || [];
        const allTaskGroups = taskGroupsData.task_groups || [];
        const requiredActions = (actionsData.actions || []);

        // Merge: use API-filtered recentTaskGroups (already excludes archived/completed),
        // and also include queue-store groups that match this project (also filtered)
        const apiGroupIds = new Set(recentTaskGroups.map(g => g.task_group_id));
        const additionalQueueGroups = allTaskGroups.filter(g =>
          !apiGroupIds.has(g.task_group_id) &&
          (projectTaskGroupIds.has(g.task_group_id) || g.project_id === projectId) &&
          g.group_status !== 'archived' && g.group_status !== 'complete'

        const projectTaskGroups = [...recentTaskGroups, ...additionalQueueGroups];

        // Filter required actions to this project

          a.project_id === projectId ||
          projectTaskGroupIds.has(a.task_group_id)

        // Fetch resume info if resumeId is provided
        var resumeInfo = null;
        if (resumeId) {
          try {
            var resumeRes = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/selfhost/resume/' + encodeURIComponent(resumeId));

              ${backBtn}

              return '<div class="log-entry ' + (e.importance === 'high' ? 'error' : '') + '">' +
                '<div class="log-time">' + formatDate(e.timestamp) + '</div>' +
                '<div class="log-type">' + escapeHtml(e.type) + '</div>' +
                '<div class="log-content">' + escapeHtml(e.summary || '') + '</div>' +
                '<div style="font-size:0.85rem; display:flex; gap:12px; margin-top:2px;">' + actLinks.join('') + '</div>' +
              '</div>';
            }).join('')}
          </div>` : ''}

          <div class="card">
            <h3>Sessions (${sessions.length})</h3>
            ${sessionItems}
          </div>

          <div class="action-bar" style="margin-top: 16px;">
            ${!project.archived
              ? '<button class="btn btn-secondary" onclick="archiveProject(\'' + escapeHtml(projectId) + '\')">Archive Project</button>'
              : '<button class="btn btn-primary" onclick="unarchiveProject(\'' + escapeHtml(projectId) + '\')">Unarchive Project</button>'
            }
          </div>

          ${project.projectType === 'runner-dev' ? '<div id="selfhost-section"></div>' : ''}

          ${resumeInfo ? '<div id="resume-info-section"></div>' : ''}

          ${project.projectType === 'runner-dev' ? '<div id="web-dev-mode-section"></div>' : ''}
          ${project.projectType === 'runner-dev' ? '<div id="dev-console-section"></div>' : ''}
        `;

        // Load self-hosting status for runner-dev projects
        if (project.projectType === 'runner-dev') {
          loadSelfhostStatus(projectId);
          // Render Web Dev Mode toggle
          renderWebDevModeSection(projectId);
          // Load Dev Console for runner-dev projects (if enabled)
          if (isWebDevModeEnabled(projectId)) {
            renderDevConsole(projectId);
          }
        }

        // Display resume info if available
        if (resumeInfo) {
          renderResumeInfo(resumeInfo);
        }
      } catch (error) {
        app.innerHTML = `
          <div class="card">
            <div class="error-message">Error: ${escapeHtml(error.message)}</div>
            <a href="/dashboard" class="btn btn-secondary" onclick="event.preventDefault(); navigate('/dashboard')">Back to Dashboard</a>
          </div>
        `;
      }
    }

      if (!confirm('Archive this project?')) return;

        await fetch('/api/projects/' + encodeURIComponent(projectId) + '/archive', { method: 'POST' });
        renderProjectDetail(projectId);
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    // Unarchive project
    async function unarchiveProject(projectId) {
      try {
        await fetch('/api/projects/' + encodeURIComponent(projectId) + '/unarchive', { method: 'POST' });
        renderProjectDetail(projectId);
      } catch (e) {
        showToast(e.message, 'error');

    // Save project metadata (alias, description, notes)
    async function saveProjectMetadata(projectId) {
      var aliasEl = document.getElementById('project-alias-input');
      var descEl = document.getElementById('project-description-input');
      var notesEl = document.getElementById('project-notes-input');
      var statusEl = document.getElementById('project-metadata-status');
      if (!aliasEl || !descEl || !notesEl) return;

      try {
        var res = await fetch('/api/projects/' + encodeURIComponent(projectId), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            alias: aliasEl.value || undefined,
            description: descEl.value || undefined,
            notes: notesEl.value || undefined,
          }),
        });
        if (!res.ok) throw new Error('Failed to save');
        if (statusEl) {
          statusEl.style.display = 'inline';
          statusEl.textContent = 'Saved!';
          statusEl.style.color = '#059669';
          setTimeout(function() { statusEl.style.display = 'none'; }, 2000);
        }
      } catch (e) {
        if (statusEl) {
          statusEl.style.display = 'inline';
          statusEl.textContent = 'Error: ' + e.message;
          statusEl.style.color = '#dc2626';
        }
      }
    }

    // Revert project metadata to original values
    function revertProjectMetadata(projectId, originalAlias, originalDescription, originalNotes) {
      var aliasEl = document.getElementById('project-alias-input');
      var descEl = document.getElementById('project-description-input');
      var notesEl = document.getElementById('project-notes-input');
      var statusEl = document.getElementById('project-metadata-status');
      if (aliasEl) aliasEl.value = originalAlias;
      if (descEl) descEl.value = originalDescription;
      if (notesEl) notesEl.value = originalNotes;
      if (statusEl) {
        statusEl.style.display = 'inline';
        statusEl.textContent = 'Reverted';
        statusEl.style.color = '#64748b';
        setTimeout(function() { statusEl.style.display = 'none'; }, 2000);
      }
    }

    // Render Chat page
    async function renderChat(projectId) {
      // Save current chat input draft before DOM replacement
      var existingInput = document.getElementById('chat-input');
      if (existingInput && existingInput.value) {
        chatInputDrafts[currentChatProjectId || projectId] = existingInput.value;
      }

      app.innerHTML = '<div class="loading">Loading Chat</div>';

      // Reset taskGroupId when switching to a different project's chat
      // or when starting a fresh new chat (no existing messages)
      if (currentChatProjectId !== projectId) {
        currentChatTaskGroupId = null;
        currentChatProjectId = projectId;
      }

      // Check URL params for explicit taskGroupId (e.g. from "Chat" within a task group)
      var urlParams = new URLSearchParams(window.location.search);
      var urlTaskGroupId = urlParams.get('taskGroupId');
      if (urlTaskGroupId) {
        currentChatTaskGroupId = urlTaskGroupId;
      }

      try {
        // Fetch project, conversation, and templates in parallel
        const [projectRes, conversationRes, templatesRes] = await Promise.all([
          fetch('/api/projects/' + encodeURIComponent(projectId)).then(r => r.json()),
          fetch('/api/projects/' + encodeURIComponent(projectId) + '/conversation').then(r => r.json()),
          fetch('/api/templates').then(r => r.ok ? r.json() : { templates: [] }).catch(() => ({ templates: [] }))
        ]);
        // Cache templates in settingsData for badge rendering
        settingsData.templates = templatesRes.templates || [];

        if (projectRes.error) throw new Error(projectRes.message);

        const project = projectRes.project;
        const messages = conversationRes.messages || [];
        const awaitingResponse = conversationRes.awaitingResponse;
        const awaitingMessage = conversationRes.awaitingMessage;

        const backBtn = '<a href="/projects/' + encodeURIComponent(projectId) + '" class="back-btn" onclick="event.preventDefault(); navigate(\'/projects/' + encodeURIComponent(projectId) + '\')">Back to Project</a>';

        // Build message list
        const messageItems = messages.length > 0
          ? messages.map(function(m) {
              var roleClass = m.role;
              var statusBadge = '';
              if (m.status === 'processing') {
                statusBadge = '<span class="badge badge-running">Processing</span>';
              } else if (m.status === 'awaiting_response') {
                statusBadge = '<span class="badge badge-needs_response">Awaiting Response</span>';
              } else if (m.status === 'error') {
                statusBadge = '<span class="badge badge-error">Error</span>';
              }
              var meta = '<div class="chat-bubble-meta">' + formatDate(m.timestamp) + ' ' + statusBadge + '</div>';
              // Render attached images if present in metadata
              var imagesHtml = '';
              if (m.metadata && m.metadata.images && m.metadata.images.length > 0) {
                imagesHtml = '<div style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px;">' +
                  m.metadata.images.map(function(img) {
                    return '<img src="' + img.data + '" alt="' + escapeHtml(img.name || 'attachment') + '" style="max-width: 200px; max-height: 200px; border-radius: 4px; cursor: pointer;" onclick="window.open(this.src)">';
                  }).join('') +
                '</div>';
              }
              return '<div class="chat-message ' + roleClass + '">' +
                '<div class="chat-bubble">' + escapeHtml(m.content) + imagesHtml + meta + '</div>' +
              '</div>';
            }).join('')
          : '<div class="empty-state" style="padding: 40px; text-align: center;"><p>No messages yet. Start a conversation!</p></div>';

        // Determine input mode
        var inputPlaceholder = awaitingResponse 
          ? 'Type your response...' 
          : 'Type a message to start a new task...';
        var sendBtnClass = awaitingResponse ? 'chat-send-btn respond-mode' : 'chat-send-btn';
        var sendBtnText = awaitingResponse ? 'Respond' : 'Send';
        var inputClass = awaitingResponse ? 'chat-input respond-mode' : 'chat-input';

        // Status bar for awaiting response
        var statusBar = '';
        if (awaitingResponse && awaitingMessage) {
          var question = awaitingMessage.metadata && awaitingMessage.metadata.clarificationQuestion 
            ? awaitingMessage.metadata.clarificationQuestion 
            : 'The assistant is waiting for your response.';

            '<strong>Awaiting Response:</strong> ' + escapeHtml(question) +

          }

          }

        app.innerHTML =

            '<h2>Chat: ' + escapeHtml(project.alias || project.projectPath) + '</h2>' +

            '<div class="action-bar">' +
              backBtn +
              '<button class="refresh-btn" onclick="renderChat(\'' + escapeHtml(projectId) + '\')">Refresh</button>' +
              '<button class="btn btn-secondary" onclick="openProjectSettings(\'' + escapeHtml(projectId) + '\')">Settings</button>' +
            '</div>' +
          '</div>' +
          '<div class="card chat-container">' +
            '<div class="chat-messages" id="chat-messages">' + messageItems + '</div>' +
            statusBar +

              '<div class="chat-drop-overlay" id="chat-drop-overlay">Drop files here to attach</div>' +
              '<div id="cmd-dropdown-bar" class="cmd-dropdown-bar" style="display:none;">' +
                '<span class="cmd-dropdown-label">Commands:</span>' +
                '<button class="cmd-dropdown-toggle" id="cmd-toggle-global" data-testid="cmd-toggle-global" onclick="toggleCommandDropdown(\'global\')">Global</button>' +
                '<select class="cmd-dropdown-select" id="cmd-select-global" data-testid="cmd-select-global" style="display:none;" onchange="selectSettingsCommand(this, \'' + escapeHtml(projectId) + '\')"><option value="">-- select --</option></select>' +
                '<button class="cmd-dropdown-toggle" id="cmd-toggle-project" data-testid="cmd-toggle-project" onclick="toggleCommandDropdown(\'project\')">Project</button>' +
