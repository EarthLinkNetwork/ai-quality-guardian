    async function selectAgent(name, type) {
      if (agentPageState.selected && agentPageState.selected.name === name && agentPageState.selected.type === type) return;
      agentGuardUnsaved(async function() {
        agentPageState.isNew = false;
        agentPageState.selected = { name: name, type: type };
        agentPageState.isDirty = false;
        try {
          var aPp = agentPageState.scope === 'project' ? projectPathParam(agentPageState.projectPath) : '';
          var res = await fetch('/api/claude-files/agents/' + agentPageState.scope + '/' + type + '/' + encodeURIComponent(name) + aPp);
          var data = await res.json();
          agentPageState.editorContent = data.content || '';
          agentPageState.savedContent = agentPageState.editorContent;
        } catch (error) {
          showToast('Failed to load: ' + error.message, 'error');
          agentPageState.editorContent = '';
          agentPageState.savedContent = '';
        }
        renderAgentsContent();
      });
    }

    function startNewAgent() {
      agentGuardUnsaved(function() {
        agentPageState.isNew = true;
        agentPageState.selected = null;
        agentPageState.newName = '';
        agentPageState.newType = 'agent';
        agentPageState.isDirty = false;
        renderAgentsContent();
      });
    }

    function cancelNewAgent() {
      agentPageState.isNew = false;
      agentPageState.isDirty = false;
      renderAgentsContent();
    }

    /**
     * Sync tool checkboxes into the frontmatter of the editor textarea
     */
    function syncAgentTools() {
      var editorEl = document.getElementById('agent-editor');
      var toolsContainer = document.getElementById('agent-tools-edit');
      if (!editorEl || !toolsContainer) return;

      var checked = [];
      toolsContainer.querySelectorAll('input[type="checkbox"]:checked').forEach(function(cb) { checked.push(cb.value); });
      var toolsYaml = checked.map(function(t) { return '  - ' + t; }).join('\n');

      var content = editorEl.value;
      // Replace tools block in frontmatter
      var replaced = content.replace(/tools:\s*\n((?:\s+-\s+\S+\n?)*)/, 'tools:\n' + toolsYaml + '\n');
      if (replaced === content && content.includes('---')) {
        // No existing tools block, add before closing ---
        var parts = content.split('---');
        if (parts.length >= 3) {
          parts[1] = parts[1].trimEnd() + '\ntools:\n' + toolsYaml + '\n';
          replaced = parts.join('---');
        }
      }
      editorEl.value = replaced;
    }

    function saveNewAgent() {
      var nameInput = document.getElementById('agent-new-name');
      var editorEl = document.getElementById('agent-editor');
      var typeSelect = document.getElementById('agent-new-type');
      var errorEl = document.getElementById('agent-name-error');
      var name = nameInput ? nameInput.value.trim() : '';
      var content = editorEl ? editorEl.value : '';
      var type = typeSelect ? typeSelect.value : agentPageState.newType;
      // Client-side validation (AC-7)
      if (!name) {
        if (errorEl) { errorEl.textContent = 'Name is required.'; errorEl.style.display = 'block'; }
        showToast('Please enter a name', 'warning'); return;
      }
      if (!isValidFilenameClient(name)) {
        if (errorEl) { errorEl.textContent = 'Invalid name. Must start with a letter or number. Only letters, numbers, dash, underscore, dot allowed.'; errorEl.style.display = 'block'; }
        showToast('Invalid filename: must start with letter/number, only [a-z0-9._-]', 'warning'); return;
      }
      if (errorEl) { errorEl.style.display = 'none'; }

      // Inject tool selections into content if checkboxes are checked
      var toolsContainer = document.getElementById('agent-tools-new');
      if (toolsContainer) {
        var checked = [];
        toolsContainer.querySelectorAll('input[type="checkbox"]:checked').forEach(function(cb) { checked.push(cb.value); });
        if (checked.length > 0) {
          var toolsYaml = checked.map(function(t) { return '  - ' + t; }).join('\n');
          content = content.replace(/tools:\s*\n((?:\s+-\s+\S+\n?)*)/, 'tools:\n' + toolsYaml + '\n');
        }
      }

      var typeLabel = type === 'skill' ? 'skill' : 'agent';
      showConfirmDialog('Create ' + typeLabel + '?', 'Create ' + name + '.md', 'Create', async function() {
        try {
          var aPp = agentPageState.scope === 'project' ? projectPathParam(agentPageState.projectPath) : '';
          var res = await fetch('/api/claude-files/agents/' + agentPageState.scope + '/' + type + '/' + encodeURIComponent(name) + aPp, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: content }),
          });
          var data = await res.json();
          if (data.success) {
            showToast(typeLabel + ' created: ' + name, 'success');
            agentPageState.isNew = false;
            agentPageState.selected = { name: name, type: type };
            agentPageState.editorContent = content;
            agentPageState.savedContent = content;
            agentPageState.isDirty = false;
            renderAgentsPage();
          } else { showToast('Failed: ' + (data.error || '') + ' - ' + (data.message || 'Unknown error'), 'error'); }
        } catch (error) { showToast('API error: ' + error.message, 'error'); }
      }, { danger: false });
    }

    function saveAgent(name, type) {
      var editorEl = document.getElementById('agent-editor');
      var content = editorEl ? editorEl.value : '';
      var typeLabel = type === 'skill' ? 'skill' : 'agent';
      showConfirmDialog('Save ' + typeLabel + '?', 'Save ' + name + '.md', 'Save', async function() {
        try {
          var aPp = agentPageState.scope === 'project' ? projectPathParam(agentPageState.projectPath) : '';
          var res = await fetch('/api/claude-files/agents/' + agentPageState.scope + '/' + type + '/' + encodeURIComponent(name) + aPp, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: content }),
          });
          var data = await res.json();
          if (data.success) {
            showToast(typeLabel + ' saved: ' + name, 'success');
            agentPageState.editorContent = content;
            agentPageState.savedContent = content;
            agentPageState.isDirty = false;
          } else { showToast('Failed: ' + (data.error || '') + ' - ' + (data.message || 'Unknown error'), 'error'); }
        } catch (error) { showToast('API error: ' + error.message, 'error'); }
      }, { danger: false });
    }

    function deleteAgent(name, type) {
      var typeLabel = type === 'skill' ? 'skill' : 'agent';
      showConfirmDialog('Delete ' + typeLabel + '?', 'Delete ' + name + '.md? This cannot be undone.', 'Delete', async function() {
        try {
          var aPp = agentPageState.scope === 'project' ? projectPathParam(agentPageState.projectPath) : '';
          var res = await fetch('/api/claude-files/agents/' + agentPageState.scope + '/' + type + '/' + encodeURIComponent(name) + aPp, { method: 'DELETE' });

          if (data.success) {
            showToast(typeLabel + ' deleted: ' + name, 'success');

        } catch (error) { showToast('API error: ' + error.message, 'error'); }
      }, { danger: true });

    // =========================================================================
    // MCP Servers Page - 2-pane layout
    // =========================================================================
    let mcpPageState = {
      scope: 'global',
      projectPath: '', // selected project path for project scope
      selectedServer: null,
      data: { global: {}, project: {} },
      paths: { global: '', project: '' },
    };

    async function renderMcpServersPage() {
      app.innerHTML = '<div class="loading">Loading MCP Servers...</div>';
      try {
        await loadProjectListCached();
        // Use unified sidebar context
        mcpPageState.scope = getContextScope();
        mcpPageState.projectPath = claudeCodeContext.projectPath;
        if (!mcpPageState.projectPath) {
          mcpPageState.projectPath = getFirstLocalProjectPath();
        }
        var mPp = projectPathParam(mcpPageState.projectPath);
        const [globalRes, projectRes] = await Promise.all([
          fetch('/api/claude-settings/global'),
          fetch('/api/claude-settings/project' + mPp),
        ]);
        const globalData = globalRes.ok ? await globalRes.json() : { settings: {}, path: '', exists: false };
        const projectData = projectRes.ok ? await projectRes.json() : { settings: {}, path: '', exists: false };
        mcpPageState.data.global = (globalData.settings || {}).mcpServers || {};
        mcpPageState.data.project = (projectData.settings || {}).mcpServers || {};
        mcpPageState.paths.global = globalData.path || '~/.claude/settings.json';
        mcpPageState.paths.project = projectData.path || '.claude/settings.json';
        mcpPageState._fullSettings = { global: globalData.settings || {}, project: projectData.settings || {} };
        renderMcpServersContent();
      } catch (error) {
        app.innerHTML = '<div class="card"><h2>Error Loading MCP Servers</h2><p>' + escapeHtml(error.message) + '</p><button class="btn btn-primary" onclick="renderMcpServersPage()" style="margin-top:16px;">Retry</button></div>';
      }
    }

          '<div class="item-meta" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(cmdInfo) + '</div></div></div>';

        listItems = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:0.85rem;">No MCP servers configured</div>';

          '<div class="hook-field"><label>Command</label><input type="text" id="mcp-cmd-' + escapeHtml(name) + '" value="' + escapeHtml(srv.command || '') + '" onchange="updateMcpField(\'' + escapeHtml(name) + '\',\'command\',this.value)" /></div>' +

      app.innerHTML = `
        <div class="page-header">

      mcpPageState.selectedServer = null;
      renderMcpServersPage();
    }

    function selectMcpServer(name) {
      mcpPageState.selectedServer = name;
      renderMcpServersContent();

    function addMcpServerPrompt() {
      showInputDialog('Add MCP Server', [
        { name: 'serverName', label: 'Server Name', placeholder: 'e.g. my-mcp-server', required: true, hint: 'Unique identifier for this MCP server' },
      ], 'Add Server', function(values) {
        var name = values.serverName;
        var scope = mcpPageState.scope;
        if (!mcpPageState.data[scope]) mcpPageState.data[scope] = {};
        if (mcpPageState.data[scope][name]) {
          showToast('Server "' + name + '" already exists', 'warning');
          return;
        }
        mcpPageState.data[scope][name] = { command: '', args: [] };
        mcpPageState.selectedServer = name;
        renderMcpServersContent();
      });

    function deleteMcpServer(name) {
      showConfirmDialog(
        'Delete MCP server?',
        'Remove "' + name + '" from configuration? Save to persist.',

        function() {
          const scope = mcpPageState.scope;
          delete mcpPageState.data[scope][name];
          mcpPageState.selectedServer = null;
          renderMcpServersContent();
        },

        html += '<div><strong style="font-size:1.5rem;">' + report.passed + '</strong>/<span style="color:#6b7280;">' + report.totalCases + '</span><br><span style="font-size:0.8rem;color:#6b7280;">Passed</span></div>';
        html += '<div><strong style="font-size:1.5rem;">' + report.durationMs + 'ms</strong><br><span style="font-size:0.8rem;color:#6b7280;">Duration</span></div>';

    function assistantRenderMessages() {
      var el = document.getElementById('assistant-messages');
      if (!el) return;
      var html = '<div class="assistant-msg system">Describe what you want to set up. I\'ll generate hooks, commands, agents, and other Claude Code configurations for you.</div>';
      assistantState.messages.forEach(function(m) {
        html += '<div class="assistant-msg ' + m.role + '">' + escapeHtml(m.text) + '</div>';
      });
      if (assistantState.loading) {
        html += '<div class="assistant-msg system"><span class="assistant-spinner"></span> Generating proposal...</div>';
      }
      el.innerHTML = html;
      el.scrollTop = el.scrollHeight;

    async function assistantSend() {
      var inp = document.getElementById('assistant-input');
      var prompt = inp ? inp.value.trim() : '';
      if (!prompt || assistantState.loading) return;
      inp.value = '';

      var scope = document.getElementById('assistant-scope');
      var scopeVal = scope ? scope.value : 'project';

      assistantState.messages.push({ role: 'user', text: prompt });
      assistantState.loading = true;
      assistantRenderMessages();

      try {
        var useMock = window.location.search.includes('mock=true');
        var url = '/api/assistant/propose' + (useMock ? '?mock=true' : '');
        var proposeBody = { prompt: prompt, scope: scopeVal };
        if (assistantState.repoProfile) proposeBody.repoProfile = assistantState.repoProfile;
        var resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(proposeBody)
        });
        if (!resp.ok) {
          var errData = await resp.json().catch(function() { return {}; });
          throw new Error((errData.error || resp.status) + ': ' + (errData.message || resp.statusText));
        }
        var planSet = await resp.json();
        assistantState.planSet = planSet;
        assistantState.messages.push({ role: 'system', text: 'Generated ' + planSet.choices.length + ' proposal(s). See the cards on the right.' });
        assistantRenderMessages();
        assistantRenderProposals(planSet);
      } catch (err) {
        assistantState.messages.push({ role: 'system', text: 'Error: ' + err.message });
        assistantRenderMessages();
        showToast('Failed to generate proposal: ' + err.message, 'error');
      } finally {
        assistantState.loading = false;
        assistantRenderMessages();
      }
    }

    function assistantRenderProposals(planSet) {
      var el = document.getElementById('assistant-proposals');
      if (!el || !planSet || !planSet.choices) return;

      // Set-based header
      var html = '<div style="margin-bottom:12px;font-size:0.85rem;color:#6b7280;">' + planSet.choices.length + ' proposal(s) generated</div>';

      planSet.choices.forEach(function(choice, idx) {
        var letter = String.fromCharCode(65 + idx);
        var scopeClass = choice.scope || 'project';
        html += '<div class="proposal-card" data-testid="proposal-card">';
        html += '<h3>Plan ' + letter + ': ' + escapeHtml(choice.title) + '</h3>';
        html += '<span class="scope-badge ' + scopeClass + '">' + scopeClass + '</span>';
        html += '<div class="summary">' + escapeHtml(choice.summary) + '</div>';

        // Artifacts
        html += '<div class="artifact-list">';
        (choice.artifacts || []).forEach(function(a) {
          html += '<div class="artifact-item">';
          html += '<span class="artifact-kind">' + a.kind + '</span>';
          html += '<span class="artifact-name">' + escapeHtml(a.name) + '</span>';
          html += '<span class="artifact-path">' + escapeHtml(a.targetPathHint || '') + '</span>';
          html += '</div>';
        });
        html += '</div>';

        // Risk notes
        (choice.riskNotes || []).forEach(function(r) {
          html += '<div class="risk-note">' + escapeHtml(r) + '</div>';
        });

        // Questions
        if (choice.questions && choice.questions.length > 0) {
          html += '<div style="margin-top:8px;padding:8px 12px;background:#eff6ff;border-radius:4px;font-size:0.85rem;color:#1e40af;">';
          html += '<strong>Questions:</strong><ul style="margin:4px 0 0 16px;">';
          choice.questions.forEach(function(q) { html += '<li>' + escapeHtml(q) + '</li>'; });
          html += '</ul></div>';
        }

        // Actions
        html += '<div class="proposal-actions">';
        html += '<button class="btn btn-secondary" data-testid="preview-btn" onclick="assistantPreview(' + idx + ')">Preview</button>';
        html += '<button class="btn btn-primary" data-testid="apply-btn" onclick="assistantApply(' + idx + ')">Apply</button>';
        html += '<button class="btn btn-secondary" data-testid="save-plugin-btn" onclick="assistantSavePlugin(' + idx + ')">Save as Plugin</button>';
        html += '</div>';

        // Preview section (hidden by default)
        html += '<div class="preview-section" id="preview-' + idx + '" style="display:none;"></div>';

        // Post-apply result area (hidden by default)
        html += '<div id="apply-result-' + idx + '" data-testid="apply-result" style="display:none;"></div>';

        html += '</div>';
      });
      el.innerHTML = html;
    }

    function assistantPreview(choiceIdx) {
      var planSet = assistantState.planSet;
      if (!planSet) return;
      var choice = planSet.choices[choiceIdx];
      if (!choice) return;
      var previewEl = document.getElementById('preview-' + choiceIdx);
      if (!previewEl) return;
      if (previewEl.style.display !== 'none') { previewEl.style.display = 'none'; return; }
      var lines = [];
      (choice.artifacts || []).forEach(function(a) {
        lines.push('--- ' + a.kind + ': ' + a.name + ' ---');
        lines.push('Path: ' + (a.targetPathHint || '(auto)'));
        if (a.content) {
          lines.push('');
          lines.push(a.content);
        }
        if (a.patch) {
          lines.push('');
          lines.push('Patch: ' + JSON.stringify(a.patch, null, 2));
        }
        lines.push('');
      });
      previewEl.textContent = lines.join('\n');
      previewEl.style.display = 'block';
    }

    async function assistantApply(choiceIdx) {
      var planSet = assistantState.planSet;
      if (!planSet) return;
      var choice = planSet.choices[choiceIdx];
      if (!choice) return;

      // Pre-apply validation (dry-run)
      try {
        var valResp = await fetch('/api/assistant/validate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ choice: choice })
        });
        var valResult = await valResp.json();
        if (!valResp.ok || (valResult.validationErrors && valResult.validationErrors.length > 0)) {
          var errList = (valResult.validationErrors || []).join('\n');
          showToast('Plan rejected: ' + errList, 'error');
          assistantState.messages.push({ role: 'system', text: 'Validation failed:\n' + errList });
          assistantRenderMessages();
          return;
        }
      } catch (err) {
        showToast('Validation error: ' + err.message, 'error');
        return;
      }

      var detailHtml = '<div style="margin:8px 0;padding:8px 12px;background:#f9fafb;border-radius:4px;font-size:0.85rem;max-height:200px;overflow-y:auto;"><strong>Scope:</strong> ' + escapeHtml(choice.scope || 'project') + '<br><br>';
      (choice.artifacts || []).forEach(function(a) {
        detailHtml += '<span class="artifact-kind" style="display:inline-block;margin-right:4px;">' + a.kind + '</span> ' + escapeHtml(a.name) + '<br>';
      });
      detailHtml += '</div>';
      showConfirmDialog(
        'Apply Plan?',
        'This will create/update the following files:',
        'Apply',
        async function() {
          try {
            var resp = await fetch('/api/assistant/apply', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ choice: choice })
            });
            var result = await resp.json();
            if (!resp.ok || !result.success) {
              throw new Error((result.validationErrors || result.errors || []).join(', ') || result.message || 'Apply failed');
            }
            assistantState.lastApplyResult = { choiceIdx: choiceIdx, result: result, choice: choice };
            var msg = 'Applied successfully.';
            if (result.created.length) msg += ' Created: ' + result.created.length + ' file(s).';
            if (result.updated.length) msg += ' Updated: ' + result.updated.length + ' file(s).';
            showToast(msg, 'success');
            assistantState.messages.push({ role: 'system', text: msg });
            assistantRenderMessages();
            // Show "Open created items" links
            assistantShowPostApply(choiceIdx, result);
          } catch (err) {
            showToast('Apply failed: ' + err.message, 'error');
            // Show "Rollback now" button on failure
            assistantShowRollbackOption(choiceIdx, choice, err.message);
          }
        },
        { detailHtml: detailHtml }
      );
    }

        var file = e.target.files[0];
        if (!file) return;
        try {
          var text = await file.text();

          var resp = await fetch('/api/assistant/plugins/import', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(pluginData)
          });

            var err = await resp.json().catch(function() { return {}; });
            throw new Error(err.message || 'Import failed');
          }
          showToast('Plugin imported successfully', 'success');
          await loadPluginsList();
        } catch (err) {
          showToast('Import failed: ' + err.message, 'error');
        }
      };
      input.click();

    }


    // Router
    function router() {
      const path = window.location.pathname;
      const search = new URLSearchParams(window.location.search);
      currentPath = path;
      updateNav(path);

      // Stop live projects refresh when navigating away from dashboard
      if (path !== '/dashboard') {
        stopLiveProjectsRefresh();
      }

      if (path === '/dashboard') {
        renderDashboard();
      } else if (path === '/projects') {
        renderProjectList();
      } else if (path === '/' || path === '') {
        renderTaskGroupList();
      } else if (path === '/activity') {
        renderActivity();
      } else if (path.startsWith('/task-groups/')) {
        const taskGroupId = decodeURIComponent(path.split('/task-groups/')[1]);
        renderTaskList(taskGroupId);
      } else if (path.startsWith('/tasks/')) {
        const taskId = decodeURIComponent(path.split('/tasks/')[1]);
        renderTaskDetail(taskId);
      } else if (path.startsWith('/projects/')) {
        const projectId = decodeURIComponent(path.split('/projects/')[1]);
        const resumeId = search.get('resume');
        renderProjectDetail(projectId, resumeId);
      } else if (path.startsWith('/runs/')) {
        const runId = decodeURIComponent(path.split('/runs/')[1]);
        renderRunDetail(runId);
      } else if (path.startsWith('/sessions/')) {
        const sessionId = decodeURIComponent(path.split('/sessions/')[1]);
        renderSessionDetail(sessionId);
      } else if (path === '/new') {
        const group = search.get('group') || '';
        renderNewCommandForm(group);
      } else if (path === '/agent') {
        renderAgentLauncher();
      } else if (path.startsWith('/chat/')) {
        const projectId = decodeURIComponent(path.split('/chat/')[1]);
        renderChat(projectId);
      } else if (path === '/settings') {
        renderSettings();
      } else if (path === '/hooks') {
        renderHooksPage();
      } else if (path === '/commands') {
        renderCommandsPage();
      } else if (path === '/agents') {
        renderAgentsPage();
      } else if (path === '/mcp-servers') {
        renderMcpServersPage();
      } else if (path === '/backup') {
        renderBackupPage();
      } else if (path === '/assistant' || path === '/ai-generate') {
        renderAssistantPage();
      } else if (path === '/plugins') {
        renderPluginsPage();
      } else {
        app.innerHTML = `
          <div class="card">
            <h2>404 - Page Not Found</h2>
            <p>The page you're looking for doesn't exist.</p>
            <button class="btn btn-primary" onclick="navigate('/')" style="margin-top: 16px;">Go Home</button>
          </div>
        `;
      }
    }

    // ===== Running Tasks Modal =====
    async function showRunningModal() {
      try {
        const res = await fetch('/api/task-groups');
        const groups = await res.json();
        const runningTasks = [];
        (groups || []).forEach(function(g) {
          (g.tasks || []).forEach(function(t) {
            if (t.status === 'running') {
              runningTasks.push({ project: g.project_id, group: g.name || g.id, task: t });
            }
          });
        });
        let html = '<div style="max-height:400px;overflow-y:auto;">';
        if (runningTasks.length === 0) {
          html += '<p style="color:#6b7280;">No running tasks.</p>';

          html += '<table style="width:100%;border-collapse:collapse;font-size:0.85rem;">' +
            '<thead><tr style="border-bottom:2px solid #e5e7eb;text-align:left;">' +

            '<th style="padding:8px;">Task</th><th style="padding:8px;">Started</th>' +
            '<th style="padding:8px;"></th></tr></thead><tbody>';
          runningTasks.forEach(function(rt) {
            const started = rt.task.created_at ? new Date(rt.task.created_at).toLocaleString() : '-';

              '<td style="padding:8px;">' + escapeHtml(started) + '</td>' +
              '<td style="padding:8px;"><button class="btn btn-sm btn-danger" onclick="cancelRunningTask(\'' + escapeHtml(rt.task.id) + '\')">Cancel</button></td>' +
            '</tr>';
          });
          html += '</tbody></table>';
        }
        html += '</div>';
        const overlay = showConfirmDialog('Running Tasks', '', 'Close', function() {}, { danger: false, detailHtml: html });
        // Override to hide the message paragraph
        const p = overlay.querySelector('.confirm-dialog p');
        if (p) p.style.display = 'none';

    async function cancelRunningTask(taskId) {
      try {
        await fetch('/api/tasks/' + encodeURIComponent(taskId) + '/cancel', { method: 'POST' });
        showToast('Task cancelled', 'success');
        showRunningModal();
      } catch (e) {
        showToast('Failed to cancel: ' + e.message, 'error');
      }
    }

    // Initialize sidebar
    loadSidebarProjectInfo();
    startRunningPoll();

    // =========================================================================
    // Web Dev Mode Functions
    // =========================================================================

    function getWebDevModeKey(projectId) {
      return 'webDevMode_' + projectId;
    }

    function isWebDevModeEnabled(projectId) {
      return localStorage.getItem(getWebDevModeKey(projectId)) === 'enabled';
    }

    function setWebDevModeEnabled(projectId, enabled) {
      if (enabled) {
        localStorage.setItem(getWebDevModeKey(projectId), 'enabled');
      } else {
        localStorage.removeItem(getWebDevModeKey(projectId));
      }
    }

    function renderWebDevModeSection(projectId) {
      var section = document.getElementById('web-dev-mode-section');
      if (!section) return;

      var enabled = isWebDevModeEnabled(projectId);

      section.innerHTML = `
        <div class="card web-dev-mode-card">
          <div class="web-dev-mode-header">
            <h3>
              Web Dev Mode
              <span class="web-dev-mode-status ${enabled ? 'enabled' : 'disabled'}">
                ${enabled ? 'Enabled' : 'Disabled'}
              </span>
            </h3>
            <div class="web-dev-mode-toggle ${enabled ? 'enabled' : ''}"
                 onclick="toggleWebDevMode('${escapeHtml(projectId)}')"
                 title="${enabled ? 'Click to disable' : 'Click to enable'}">
            </div>
          </div>
          <p class="web-dev-mode-description">
            Web Dev Mode allows you to develop this project directly from the Web UI,
            including running commands, viewing logs, and managing git operations.
          </p>
          ${enabled ? `
            <div class="web-dev-mode-warning">
              <strong>Safety Notice</strong>
              Web Dev Mode is enabled. Git push and destructive operations will require confirmation.
              Always verify gate:all passes before pushing.
            </div>
          ` : ''}
        </div>
      `;
    }

    function toggleWebDevMode(projectId) {
      var currentlyEnabled = isWebDevModeEnabled(projectId);

      if (currentlyEnabled) {
        // Disabling - just disable without confirmation
        setWebDevModeEnabled(projectId, false);
        renderWebDevModeSection(projectId);
        // Hide dev console
        var devSection = document.getElementById('dev-console-section');
        if (devSection) devSection.innerHTML = '';
      } else {
        // Enabling - show confirmation dialog
        showSafetyDialog(
          'Enable Web Dev Mode?',
          'Enabling Web Dev Mode allows you to run commands and modify code directly from the Web UI. ' +
          'This is intended for development of this PM Orchestrator Runner project itself. ' +
          'Git push requires gate:all to pass first.',
          'Enable',
          function() {
            setWebDevModeEnabled(projectId, true);
            renderWebDevModeSection(projectId);
            renderDevConsole(projectId);
          }
        );
      }
    }

    function showSafetyDialog(title, message, confirmText, onConfirm) {
      showConfirmDialog(title, message, confirmText, onConfirm, { danger: true });
    }

    async function devLoadTree(dirPath) {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      devConsoleState.currentPath = dirPath;
      var listEl = document.getElementById('dev-file-list');
      if (!listEl) return;

      listEl.innerHTML = '<div class="loading">Loading...</div>';

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/fs/tree?root=' + encodeURIComponent(dirPath));
        var data = await resp.json();

        if (data.error) {
          listEl.innerHTML = '<div class="error-message">' + escapeHtml(data.message) + '</div>';
          return;
        }

        var html = '';
        if (dirPath !== '.') {
          var parentPath = dirPath.split('/').slice(0, -1).join('/') || '.';
          html += '<div class="dev-file-item parent" onclick="devLoadTree(\'' + escapeHtml(parentPath) + '\')">.. (parent)</div>';
        }

        for (var entry of data.entries) {
          if (entry.type === 'directory') {
            html += '<div class="dev-file-item directory" onclick="devLoadTree(\'' + escapeHtml(entry.relPath) + '\')">' + escapeHtml(entry.name) + '</div>';
          } else {
            html += '<div class="dev-file-item file" onclick="devReadFile(\'' + escapeHtml(entry.relPath) + '\')">' + escapeHtml(entry.name) + '</div>';
          }
        }

        listEl.innerHTML = html || '<div class="empty-state">Empty directory</div>';
      } catch (err) {
        listEl.innerHTML = '<div class="error-message">Error: ' + escapeHtml(err.message) + '</div>';
      }
    }

    async function devReadFile(filePath) {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      devConsoleState.currentFile = filePath;
      var pathEl = document.getElementById('dev-file-path');
      var contentEl = document.getElementById('dev-file-content');
      if (!pathEl || !contentEl) return;

      pathEl.textContent = filePath;
      contentEl.textContent = 'Loading...';

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/fs/read?path=' + encodeURIComponent(filePath));
        var data = await resp.json();

        if (data.error) {
          contentEl.textContent = 'Error: ' + data.message;
          return;
        }

        contentEl.textContent = data.content;
      } catch (err) {
        contentEl.textContent = 'Error: ' + err.message;
      }
    }

    async function devSearch() {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      var input = document.getElementById('dev-search-input');
      var resultsEl = document.getElementById('dev-search-results');
      if (!input || !resultsEl) return;

      var query = input.value.trim();
      if (!query) {
        resultsEl.style.display = 'none';
        return;
      }

      resultsEl.innerHTML = '<div class="loading">Searching...</div>';
      resultsEl.style.display = 'block';

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/fs/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: query })
        });
        var results = await resp.json();

        if (results.error) {
          resultsEl.innerHTML = '<div class="error-message">' + escapeHtml(results.message) + '</div>';
          return;
        }

        if (results.length === 0) {
          resultsEl.innerHTML = '<div class="empty-state">No results found</div>';
          return;
        }

        var html = results.slice(0, 50).map(function(r) {
          return '<div class="dev-search-result" onclick="devReadFile(\'' + escapeHtml(r.relPath) + '\')">' +
            '<span class="path">' + escapeHtml(r.relPath) + '</span>' +
            '<span class="line">:' + r.line + '</span><br>' +
            '<span class="text">' + escapeHtml(r.text.substring(0, 100)) + '</span>' +
            '</div>';
        }).join('');

        resultsEl.innerHTML = html;
      } catch (err) {
        resultsEl.innerHTML = '<div class="error-message">Error: ' + escapeHtml(err.message) + '</div>';
      }
    }

    async function devApplyPatch() {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      var input = document.getElementById('dev-patch-input');
      var statusEl = document.getElementById('dev-patch-status');
      if (!input || !statusEl) return;

      var patch = input.value.trim();
      if (!patch) {
        statusEl.innerHTML = '<span style="color:#dc2626;">No patch provided</span>';
        return;
      }

      statusEl.innerHTML = '<span style="color:#2563eb;">Applying...</span>';

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/fs/applyPatch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ patch: patch })
        });
        var result = await resp.json();

        if (result.ok) {
          statusEl.innerHTML = '<span style="color:#16a34a;">Success! Changed: ' + escapeHtml(result.changedFiles.join(', ')) + '</span>';
          input.value = '';
          // Refresh file view if current file was changed
          if (devConsoleState.currentFile && result.changedFiles.includes(devConsoleState.currentFile)) {
            devReadFile(devConsoleState.currentFile);
          }
        } else {
          statusEl.innerHTML = '<span style="color:#dc2626;">Failed: ' + escapeHtml(result.error) + '</span>';
        }
      } catch (err) {
        statusEl.innerHTML = '<span style="color:#dc2626;">Error: ' + escapeHtml(err.message) + '</span>';
      }
    }

    async function devRunCmd() {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      var input = document.getElementById('dev-cmd-input');
      var logEl = document.getElementById('dev-cmd-log');
      if (!input || !logEl) return;

      var command = input.value.trim();
      if (!command) return;

      logEl.innerHTML = '<span class="system">$ ' + escapeHtml(command) + '</span>\n<span class="system">Starting...</span>\n';

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/cmd/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command: command })
        });
        var result = await resp.json();

        if (result.error) {
          logEl.innerHTML += '<span class="stderr">Error: ' + escapeHtml(result.message) + '</span>\n';
          return;
        }

        devConsoleState.activeRunId = result.runId;
        input.value = '';

        // Start polling for logs
        devStartLogPolling(result.runId);
      } catch (err) {
        logEl.innerHTML += '<span class="stderr">Error: ' + escapeHtml(err.message) + '</span>\n';
      }
    }

    function devStartLogPolling(runId) {
      // Clear any existing interval
      if (devConsoleState.pollInterval) {
        clearInterval(devConsoleState.pollInterval);
      }

      var lastLogCount = 0;

      devConsoleState.pollInterval = setInterval(async function() {
        var projectId = devConsoleState.projectId;
        if (!projectId) return;

        try {
          var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/cmd/' + encodeURIComponent(runId) + '/log');
          var data = await resp.json();

          if (data.error) return;

          var logEl = document.getElementById('dev-cmd-log');
          if (!logEl) return;

          // Render all logs
          var html = '';
          for (var entry of data.logs) {
            var cls = entry.stream;
            html += '<span class="' + cls + '">' + escapeHtml(entry.text) + '</span>';
          }
          logEl.innerHTML = html;
          logEl.scrollTop = logEl.scrollHeight;

          // Stop polling if completed
          if (data.status === 'completed' || data.status === 'failed') {
            clearInterval(devConsoleState.pollInterval);
            devConsoleState.pollInterval = null;
            devConsoleState.activeRunId = null;
            devLoadCmdHistory();
          }
        } catch (err) {
          console.warn('Log polling error:', err);
        }
      }, 1000);
    }

    async function devLoadCmdHistory() {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      var historyEl = document.getElementById('dev-cmd-history');
      if (!historyEl) return;

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/cmd/list');
        var data = await resp.json();

        if (data.error || !data.runs || data.runs.length === 0) {
          historyEl.style.display = 'none';
          return;
        }

        var html = '<div style="font-size:0.8rem;color:#6b7280;margin-bottom:4px;">Recent commands:</div>';
        for (var run of data.runs.slice(0, 5)) {
          var statusColor = run.status === 'completed' ? '#16a34a' : run.status === 'failed' ? '#dc2626' : '#2563eb';
          html += '<div class="dev-cmd-history-item" onclick="devViewLog(\'' + escapeHtml(run.runId) + '\')">' +
            '<span>' + escapeHtml(run.command.substring(0, 40)) + (run.command.length > 40 ? '...' : '') + '</span>' +
            '<span style="color:' + statusColor + ';">' + run.status + '</span>' +
            '</div>';
        }

        historyEl.innerHTML = html;
        historyEl.style.display = 'block';
      } catch (err) {
        console.warn('Failed to load cmd history:', err);
      }
    }

    async function devViewLog(runId) {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      var logEl = document.getElementById('dev-cmd-log');
      if (!logEl) return;

      logEl.innerHTML = '<span class="system">Loading log...</span>\n';

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/cmd/' + encodeURIComponent(runId) + '/log');
        var data = await resp.json();

        if (data.error) {
          logEl.innerHTML = '<span class="stderr">Error: ' + escapeHtml(data.message) + '</span>\n';
          return;
        }

        var html = '';
        for (var entry of data.logs) {
          var cls = entry.stream;
          html += '<span class="' + cls + '">' + escapeHtml(entry.text) + '</span>';
        }
        logEl.innerHTML = html || '<span class="system">No logs</span>';
        logEl.scrollTop = logEl.scrollHeight;
      } catch (err) {
        logEl.innerHTML = '<span class="stderr">Error: ' + escapeHtml(err.message) + '</span>\n';
      }
    }

    // =========================================================================
    // Session Log Tree Functions
    // =========================================================================

    var sessionTreeState = {
      expandedNodes: new Set(),
      selectedRunId: null
    };

    async function devLoadSessionTree() {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      var contentEl = document.getElementById('session-tree-content');
      if (!contentEl) return;

      contentEl.innerHTML = '<div class="loading">Loading session tree...</div>';

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/session-logs/tree');
        var data = await resp.json();

        if (data.error) {
          contentEl.innerHTML = '<div class="error-message">' + escapeHtml(data.message || data.error) + '</div>';
          return;
        }

        if (!data.tree || data.tree.length === 0) {
          contentEl.innerHTML = '<div class="empty-state">No session logs yet. Run commands to generate logs.</div>';
          return;
        }

        var html = renderSessionTreeNodes(data.tree);
        contentEl.innerHTML = html;
      } catch (err) {
        contentEl.innerHTML = '<div class="error-message">Error: ' + escapeHtml(err.message) + '</div>';
      }
    }

    function renderSessionTreeNodes(nodes, level) {
      level = level || 0;
      var html = '';

      for (var node of nodes) {
        var isExpanded = sessionTreeState.expandedNodes.has(node.id);
        var isSelected = node.type === 'run' && sessionTreeState.selectedRunId === node.id;
        var statusClass = node.status ? ' status-' + node.status : '';
        var expandedClass = isExpanded ? ' expanded' : '';
        var selectedClass = isSelected ? ' selected' : '';
        var hasChildren = node.children && node.children.length > 0;

        html += '<div class="session-tree-node type-' + node.type + statusClass + expandedClass + selectedClass + '" ' +
          'data-node-id="' + escapeHtml(node.id) + '" ' +
          'data-node-type="' + node.type + '" ' +
          'onclick="devToggleSessionNode(\'' + escapeHtml(node.id) + '\', \'' + node.type + '\')">';

        html += '<span class="node-icon">' + (hasChildren ? (isExpanded ? '▼' : '▶') : '') + '</span>';
        html += '<span class="node-label">' + escapeHtml(node.label) + '</span>';

        if (node.status) {
          html += '<span class="node-status ' + node.status + '">' + node.status + '</span>';
        }

        html += '</div>';

        if (hasChildren && isExpanded) {
          html += '<div class="session-tree-children">';
          html += renderSessionTreeNodes(node.children, level + 1);
          html += '</div>';
        }
      }

      return html;
    }

    function devToggleSessionNode(nodeId, nodeType) {
      if (nodeType === 'run') {
        // For run nodes, show detail
        sessionTreeState.selectedRunId = nodeId;
        devShowRunDetail(nodeId);
        devRefreshSessionTree();
      } else {
        // For date and session nodes, toggle expansion
        if (sessionTreeState.expandedNodes.has(nodeId)) {
          sessionTreeState.expandedNodes.delete(nodeId);
        } else {
          sessionTreeState.expandedNodes.add(nodeId);
        }
        devRefreshSessionTree();
      }
    }

    function devRefreshSessionTree() {
      devLoadSessionTree();
    }

    function devCollapseAllSessions() {
      sessionTreeState.expandedNodes.clear();
      devRefreshSessionTree();
    }

    async function devShowRunDetail(runId) {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      var detailPanel = document.getElementById('session-log-detail');
      var titleEl = document.getElementById('session-log-detail-title');
      var metaEl = document.getElementById('session-log-detail-meta');
      var contentEl = document.getElementById('session-log-detail-content');

      if (!detailPanel || !titleEl || !metaEl || !contentEl) return;

      detailPanel.style.display = 'block';
      titleEl.textContent = 'Loading...';
      metaEl.innerHTML = '';
      contentEl.innerHTML = '<span class="log-system">Loading logs...</span>';

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/session-logs/run/' + encodeURIComponent(runId));
        var data = await resp.json();

        if (data.error) {
          titleEl.textContent = 'Error';
          contentEl.innerHTML = '<span class="log-stderr">Error: ' + escapeHtml(data.message || data.error) + '</span>';
          return;
        }

        // API returns run data directly (not wrapped in data.run)
        var run = data;
        titleEl.textContent = 'Run: ' + (run.command || runId);

        // Render metadata
        var metaHtml = '';
        metaHtml += '<div class="meta-item"><span class="meta-label">Run ID</span><span class="meta-value">' + escapeHtml(run.runId) + '</span></div>';
        metaHtml += '<div class="meta-item"><span class="meta-label">Status</span><span class="meta-value">' + escapeHtml(run.status) + '</span></div>';
        metaHtml += '<div class="meta-item"><span class="meta-label">Started</span><span class="meta-value">' + escapeHtml(run.startedAt) + '</span></div>';
        if (run.endedAt) {
          metaHtml += '<div class="meta-item"><span class="meta-label">Ended</span><span class="meta-value">' + escapeHtml(run.endedAt) + '</span></div>';
        }
        if (run.exitCode !== undefined) {
          metaHtml += '<div class="meta-item"><span class="meta-label">Exit Code</span><span class="meta-value">' + run.exitCode + '</span></div>';
        }
        if (run.sessionId) {
          metaHtml += '<div class="meta-item"><span class="meta-label">Session</span><span class="meta-value">' + escapeHtml(run.sessionId) + '</span></div>';
        }
        metaEl.innerHTML = metaHtml;

        // Render logs
        if (data.logs && data.logs.length > 0) {
          var logsHtml = '';
          for (var entry of data.logs) {
            var cls = 'log-' + (entry.stream || 'stdout');
            logsHtml += '<span class="' + cls + '">' + escapeHtml(entry.text || '') + '</span>';
          }
          contentEl.innerHTML = logsHtml;
        } else {
          contentEl.innerHTML = '<span class="log-system">No logs available</span>';
        }

        contentEl.scrollTop = 0;
      } catch (err) {
        titleEl.textContent = 'Error';
        contentEl.innerHTML = '<span class="log-stderr">Error: ' + escapeHtml(err.message) + '</span>';
      }
    }

    function devCloseLogDetail() {
      var detailPanel = document.getElementById('session-log-detail');
      if (detailPanel) {
        detailPanel.style.display = 'none';
      }
      sessionTreeState.selectedRunId = null;
      devRefreshSessionTree();
    }

    // =========================================================================
    // Runbook Preset Functions
    // =========================================================================

    var runbookCommands = {
      sync: 'git pull --rebase',
      build: 'npm run build',
      test: 'npm test',
      gate: 'npm run gate:all',
      e2e: 'npm run test:e2e'
    };

    var runbookState = {
      activeRunbook: null
    };

    async function devRunRunbook(preset) {
      if (runbookState.activeRunbook) {
        showToast('A runbook command is already running: ' + runbookState.activeRunbook, 'warning');
        return;
      }

      var command = runbookCommands[preset];
      if (!command) {
        showToast('Unknown runbook preset: ' + preset, 'error');
        return;
      }

      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      var btnEl = document.getElementById('runbook-' + preset);
      var logEl = document.getElementById('dev-cmd-log');

      // Update button state
      if (btnEl) {
        btnEl.classList.add('running');
        btnEl.classList.remove('success', 'error');
      }

      runbookState.activeRunbook = preset;

      if (logEl) {
        logEl.innerHTML = '<span class="system">$ ' + escapeHtml(command) + '</span>\n<span class="system">Starting ' + preset.toUpperCase() + '...</span>\n';
      }

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/cmd/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command: command, preset: preset })
        });
        var result = await resp.json();

        if (result.error) {
          if (logEl) {
            logEl.innerHTML += '<span class="stderr">Error: ' + escapeHtml(result.message) + '</span>\n';
          }
          devRunbookComplete(preset, false);
          return;
        }

        devConsoleState.activeRunId = result.runId;

        // Start polling for logs with runbook completion handling
        devStartRunbookPolling(result.runId, preset);
      } catch (err) {
        if (logEl) {
          logEl.innerHTML += '<span class="stderr">Error: ' + escapeHtml(err.message) + '</span>\n';
        }
        devRunbookComplete(preset, false);
      }
    }

    function devStartRunbookPolling(runId, preset) {
      // Clear any existing interval
      if (devConsoleState.pollInterval) {
        clearInterval(devConsoleState.pollInterval);
      }

      devConsoleState.pollInterval = setInterval(async function() {
        var projectId = devConsoleState.projectId;
        if (!projectId) return;

        try {
          var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/cmd/' + encodeURIComponent(runId) + '/log');
          var data = await resp.json();

          if (data.error) return;

          var logEl = document.getElementById('dev-cmd-log');
          if (logEl) {
            var html = '';
            for (var entry of data.logs) {
              var cls = entry.stream;
              html += '<span class="' + cls + '">' + escapeHtml(entry.text) + '</span>';
            }
            logEl.innerHTML = html;
            logEl.scrollTop = logEl.scrollHeight;
          }

          // Stop polling if completed
          if (data.status === 'completed' || data.status === 'failed') {
            clearInterval(devConsoleState.pollInterval);
            devConsoleState.pollInterval = null;
            devConsoleState.activeRunId = null;

            var success = data.status === 'completed' && data.exitCode === 0;
            devRunbookComplete(preset, success);

            devLoadCmdHistory();
            devRefreshSessionTree();

            // Refresh git status after gate command
            if (preset === 'gate' && success) {
              devGitRefresh();
            }
          }
        } catch (err) {
          console.warn('Log polling error:', err);
        }
      }, 1000);
    }

    function devRunbookComplete(preset, success) {
      runbookState.activeRunbook = null;

      var btnEl = document.getElementById('runbook-' + preset);
      if (btnEl) {
        btnEl.classList.remove('running');
        if (success) {
          btnEl.classList.add('success');
        } else {
          btnEl.classList.add('error');
        }

        // Clear status after 5 seconds
        setTimeout(function() {
          btnEl.classList.remove('success', 'error');
        }, 5000);
      }
    }

    // =========================================================================
    // Git Functions
    // =========================================================================

    async function devGitRefresh() {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      var statusEl = document.getElementById('dev-git-status');
      var gateStatusEl = document.getElementById('dev-git-gate-status');
      var commitBtn = document.getElementById('dev-git-commit-btn');
      var pushBtn = document.getElementById('dev-git-push-btn');

      if (statusEl) statusEl.innerHTML = '<span class="loading">Loading git status...</span>';

      try {
        // Fetch git status
        var statusResp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/git/status');
        var status = await statusResp.json();

        if (status.error) {
          if (statusEl) statusEl.innerHTML = '<span class="error-message">Error: ' + escapeHtml(status.message) + '</span>';
          return;
        }

        // Build status display
        var html = '<div class="git-branch">Branch: <strong>' + escapeHtml(status.branch) + '</strong>';
        if (status.ahead > 0) html += ' <span class="git-ahead">+' + status.ahead + ' ahead</span>';
        if (status.behind > 0) html += ' <span class="git-behind">-' + status.behind + ' behind</span>';
        html += '</div>';

        if (status.staged.length > 0) {
          html += '<div class="git-staged"><strong>Staged (' + status.staged.length + '):</strong><ul>';
          for (var f of status.staged.slice(0, 10)) {
            html += '<li>' + escapeHtml(f) + '</li>';
          }
          if (status.staged.length > 10) html += '<li>... and ' + (status.staged.length - 10) + ' more</li>';
          html += '</ul></div>';
        }

        if (status.unstaged.length > 0) {
          html += '<div class="git-unstaged"><strong>Unstaged (' + status.unstaged.length + '):</strong><ul>';
          for (var f of status.unstaged.slice(0, 10)) {
            html += '<li>' + escapeHtml(f) + '</li>';
          }
          if (status.unstaged.length > 10) html += '<li>... and ' + (status.unstaged.length - 10) + ' more</li>';
          html += '</ul></div>';
        }

        if (status.untracked.length > 0) {
          html += '<div class="git-untracked"><strong>Untracked (' + status.untracked.length + '):</strong><ul>';
          for (var f of status.untracked.slice(0, 5)) {
            html += '<li>' + escapeHtml(f) + '</li>';
          }
          if (status.untracked.length > 5) html += '<li>... and ' + (status.untracked.length - 5) + ' more</li>';
          html += '</ul></div>';
        }

        if (status.staged.length === 0 && status.unstaged.length === 0 && status.untracked.length === 0) {
          html += '<div class="git-clean">Working tree clean</div>';
        }

        if (statusEl) statusEl.innerHTML = html;

        // Fetch gate status
        var gateResp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/git/gateStatus');
        var gateData = await gateResp.json();

        if (gateData.hasPass) {
          if (gateStatusEl) {
            gateStatusEl.innerHTML = '<span class="gate-pass">gate:all PASS found (run: ' + escapeHtml(gateData.gatePass.runId) + ')</span>';
          }
          // Enable commit button if there are staged changes
          if (commitBtn && status.staged.length > 0) {
            commitBtn.disabled = false;
          }
          // Enable push button if ahead of remote
          if (pushBtn && status.ahead > 0) {
            pushBtn.disabled = false;
          }
        } else {
          if (gateStatusEl) {
            gateStatusEl.innerHTML = '<span class="gate-fail">No gate:all PASS found. Run "npm run gate:all" first.</span>';
          }
          if (commitBtn) commitBtn.disabled = true;
          if (pushBtn) pushBtn.disabled = true;
        }

      } catch (err) {
        if (statusEl) statusEl.innerHTML = '<span class="error-message">Error: ' + escapeHtml(err.message) + '</span>';
      }
    }

    async function devGitShowDiff(staged) {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      var diffEl = document.getElementById('dev-git-diff');
      if (!diffEl) return;

      diffEl.style.display = 'block';
      diffEl.innerHTML = '<span class="loading">Loading diff...</span>';

      try {
        var url = '/api/projects/' + encodeURIComponent(projectId) + '/dev/git/diff';
        if (staged) url += '?staged=true';

        var resp = await fetch(url);
        var data = await resp.json();

        if (data.error) {
          diffEl.innerHTML = '<span class="error-message">Error: ' + escapeHtml(data.message) + '</span>';
          return;
        }

        if (!data.diff || data.diff.trim() === '') {
          diffEl.innerHTML = '<span class="system">No ' + (staged ? 'staged ' : '') + 'changes</span>';
        } else {
          diffEl.innerHTML = '<pre>' + escapeHtml(data.diff) + '</pre>';
        }
      } catch (err) {
        diffEl.innerHTML = '<span class="error-message">Error: ' + escapeHtml(err.message) + '</span>';
      }
    }

    async function devGitCommit() {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      var msgInput = document.getElementById('dev-git-commit-msg');
      var resultEl = document.getElementById('dev-git-result');
      if (!msgInput || !resultEl) return;

      var message = msgInput.value.trim();
      if (!message) {
        resultEl.innerHTML = '<span class="error-message">Please enter a commit message</span>';
        return;
      }

      resultEl.innerHTML = '<span class="loading">Committing...</span>';

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/git/commit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: message })
        });
        var data = await resp.json();

        if (data.error) {
          resultEl.innerHTML = '<span class="error-message">' + escapeHtml(data.error) + ': ' + escapeHtml(data.message) + '</span>';
          if (data.reason) {
            resultEl.innerHTML += '<br><span class="system">Reason: ' + escapeHtml(data.reason) + '</span>';
          }
          return;
        }

        resultEl.innerHTML = '<span class="success">Commit created: ' + escapeHtml(data.commitHash) + '</span>';
        msgInput.value = '';
        devGitRefresh();
      } catch (err) {
        resultEl.innerHTML = '<span class="error-message">Error: ' + escapeHtml(err.message) + '</span>';
      }
    }

    async function devGitPush() {
      var projectId = devConsoleState.projectId;
      if (!projectId) return;

      // Show safety confirmation
      showSafetyDialog(
        'Push to Remote?',
        'You are about to push commits to the remote repository. ' +
        'Make sure gate:all has passed before pushing. ' +
        'This action cannot be easily undone.',
        'Push',
        function() {
          doGitPush(projectId);
        }
      );
    }

    async function doGitPush(projectId) {
      var resultEl = document.getElementById('dev-git-result');
      if (!resultEl) return;

      resultEl.innerHTML = '<span class="loading">Pushing...</span>';

      try {
        var resp = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/dev/git/push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        var data = await resp.json();

        if (data.error) {
          resultEl.innerHTML = '<span class="error-message">' + escapeHtml(data.error) + ': ' + escapeHtml(data.message) + '</span>';
          if (data.reason) {
            resultEl.innerHTML += '<br><span class="system">Reason: ' + escapeHtml(data.reason) + '</span>';
          }
          return;
        }

        resultEl.innerHTML = '<span class="success">Pushed ' + data.pushed + ' commit(s) successfully!</span>';
        devGitRefresh();
      } catch (err) {
        resultEl.innerHTML = '<span class="error-message">Error: ' + escapeHtml(err.message) + '</span>';
      }
    }

    // =========================================================================
    // End Dev Console Functions
    // =========================================================================

    // ── Global Command Bar ──

    var globalCmdBarVisible = true;

    function toggleGlobalCmdBar() {
      var bar = document.getElementById('global-cmd-bar');
      if (!bar) return;
      globalCmdBarVisible = !globalCmdBarVisible;
      bar.style.display = globalCmdBarVisible ? 'flex' : 'none';
      document.body.style.paddingBottom = globalCmdBarVisible ? '56px' : '0';
    }

    async function loadGlobalCmdProjects() {
      var select = document.getElementById('gcmd-project');
      if (!select) return;
      try {
        var data = await api('/projects');
        var projects = data.projects || data;
        var html = '<option value="">Project...</option>';
        projects.forEach(function(p) {
          var label = p.alias || p.projectPath || p.projectId;
          if (label.length > 30) label = '...' + label.slice(-27);
          html += '<option value="' + escapeHtml(p.projectId) + '">' + escapeHtml(label) + '</option>';
        });
        select.innerHTML = html;

        // Auto-select current project if on a project/chat page
        var path = window.location.pathname;
        var match = path.match(/\/(projects|chat)\/([^\/\?]+)/);
        if (match) {
          select.value = decodeURIComponent(match[2]);
        }
      } catch (e) {
        console.warn('[GlobalCmd] Failed to load projects:', e);
      }
    }

    function updateGlobalCmdGroups() {
      // Future: could load task groups for selected project
    }

    async function sendGlobalCmd() {
      var projectSelect = document.getElementById('gcmd-project');
      var input = document.getElementById('gcmd-input');
      var sendBtn = document.getElementById('gcmd-send');

      if (!input || !input.value.trim()) return;

      var projectId = projectSelect ? projectSelect.value : '';
      if (!projectId) {
        showToast('Select a project first', 'warning');
        projectSelect.focus();
        return;
      }

      var content = input.value.trim();
      input.disabled = true;
      sendBtn.disabled = true;
      sendBtn.textContent = '...';

      try {
        var data = await api('/projects/' + encodeURIComponent(projectId) + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: content })
        });

        if (data.error) throw new Error(data.message);

        input.value = '';
        showToast('Task submitted', 'success');

        // Refresh current page if on dashboard or task groups
        var path = window.location.pathname;
        if (path === '/' || path === '/dashboard' || path.startsWith('/projects/')) {
          router();
        }
      } catch (error) {
        showToast('Error: ' + error.message, 'error');
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
      }
    }

    // Show/hide logout button based on stored API key
    function updateLogoutButton() {
      const btn = document.getElementById('logout-btn');
      if (btn) btn.style.display = getStoredApiKey() ? 'inline-block' : 'none';
    }
    updateLogoutButton();

    // Sidebar AI usage cost display
    async function updateSidebarCost() {
      var costValue = document.getElementById('sidebar-cost-value');
      var costDetail = document.getElementById('sidebar-cost-detail');
      if (!costValue) return;

      try {
        var data = await api('/activity?limit=200');
        var events = data.items || data.events || data || [];

        var today = new Date().toISOString().split('T')[0];
        var todayCost = 0;
        var todayTasks = 0;
        var totalCost = 0;

        for (var i = 0; i < events.length; i++) {
          var ev = events[i];
          if (ev.cost_usd) {
            totalCost += ev.cost_usd;
            if (ev.timestamp && ev.timestamp.startsWith(today)) {
              todayCost += ev.cost_usd;
              todayTasks++;
            }
          }
        }

        costValue.textContent = '$' + todayCost.toFixed(4);
        costDetail.textContent = todayTasks + ' tasks | Total: $' + totalCost.toFixed(4);

        if (todayCost > 1) {
          costValue.style.color = '#f87171';
        } else if (todayCost > 0.1) {
          costValue.style.color = '#fbbf24';
        } else {
          costValue.style.color = '#60a5fa';
        }
      } catch (e) {
        costValue.textContent = '--';
        costDetail.textContent = '';
      }
    }

    // Initial load
    renderSidebarContext();
    router();
    loadGlobalCmdProjects();
    updateSidebarCost();
    setInterval(updateSidebarCost, 30000);
  </script>

  <div class="global-cmd-bar" id="global-cmd-bar">
    <select id="gcmd-project" onchange="updateGlobalCmdGroups()" title="Select project">
      <option value="">Project...</option>
    </select>
    <input type="text" id="gcmd-input" placeholder="Quick task... (Enter to send)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendGlobalCmd();}">
    <button onclick="sendGlobalCmd()" id="gcmd-send">Send</button>
    <button class="cmd-bar-toggle" onclick="toggleGlobalCmdBar()" title="Hide command bar">&times;</button>
  </div>
</body>
